name: Update Marketplace
# Comments about other actions apply to this action too, don't forget to update it.
description: Update marketplace.json with latest plugin versions and metadata

outputs:
  updated:
    description: Whether marketplace was updated
    value: ${{ steps.update.outputs.updated }}
  changed-plugins:
    description: List of plugins that were updated
    value: ${{ steps.update.outputs.changed-plugins }}

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Update marketplace
      id: update
      shell: bash
      run: |
        set -e

        echo "::group::Updating marketplace.json"

        UPDATED=false
        CHANGED_PLUGINS=""

        # Read current marketplace
        MARKETPLACE_FILE=".claude-plugin/marketplace.json"

        # Create temp file for new marketplace
        TEMP_MARKETPLACE=$(mktemp)

        # Get list of plugins
        PLUGIN_DIRS=$(find plugins -maxdepth 1 -mindepth 1 -type d 2>/dev/null || echo "")

        if [ -z "$PLUGIN_DIRS" ]; then
          echo "::notice::No plugins found"
          echo "updated=false" >> $GITHUB_OUTPUT
          echo "changed-plugins=" >> $GITHUB_OUTPUT
          exit 0
        fi

        # Start building new marketplace
        jq '.plugins = []' "$MARKETPLACE_FILE" > "$TEMP_MARKETPLACE"

        for plugin_dir in $PLUGIN_DIRS; do
          PLUGIN_NAME=$(basename "$plugin_dir")
          PLUGIN_JSON="$plugin_dir/.claude-plugin/plugin.json"

          if [ ! -f "$PLUGIN_JSON" ]; then
            echo "::warning::Skipping $PLUGIN_NAME - no plugin.json found"
            continue
          fi

          echo "Processing plugin: $PLUGIN_NAME"

          # Read plugin metadata
          PLUGIN_VERSION=$(jq -r '.version' "$PLUGIN_JSON")
          PLUGIN_DESC=$(jq -r '.description' "$PLUGIN_JSON")
          PLUGIN_AUTHOR=$(jq -r '.author.name' "$PLUGIN_JSON")

          # Get current version from marketplace
          CURRENT_VERSION=$(jq -r \
            ".plugins[] | select(.name == \"$PLUGIN_NAME\") | .version" \
            "$MARKETPLACE_FILE" 2>/dev/null || echo "")

          # Check if version changed
          if [ "$PLUGIN_VERSION" != "$CURRENT_VERSION" ]; then
            echo "::notice::Plugin $PLUGIN_NAME version changed: $CURRENT_VERSION -> $PLUGIN_VERSION"
            UPDATED=true
            CHANGED_PLUGINS="${CHANGED_PLUGINS}${PLUGIN_NAME},"
          fi

          # Determine category based on plugin name/path
          CATEGORY="utility"
          if echo "$PLUGIN_NAME" | grep -q "git\|commit"; then
            CATEGORY="git"
          fi

          # Read keywords from plugin.json or use defaults
          KEYWORDS=$(jq -c '.keywords // []' "$PLUGIN_JSON")

          # Determine tags based on plugin structure
          TAGS='["utility"]'
          if [ -d "$plugin_dir/commands" ]; then
            TAGS=$(echo "$TAGS" | jq '. += ["command"]')
          fi
          if [ -d "$plugin_dir/skills" ]; then
            TAGS=$(echo "$TAGS" | jq '. += ["skill"]')
          fi
          if echo "$PLUGIN_NAME" | grep -q "git\|commit"; then
            TAGS=$(echo "$TAGS" | jq '. += ["git", "automation"]')
          fi

          # Add plugin to marketplace
          jq --arg name "$PLUGIN_NAME" \
             --arg version "$PLUGIN_VERSION" \
             --arg desc "$PLUGIN_DESC" \
             --arg author "$PLUGIN_AUTHOR" \
             --arg source "./plugins/$PLUGIN_NAME" \
             --arg category "$CATEGORY" \
             --argjson tags "$TAGS" \
             --argjson keywords "$KEYWORDS" \
             '.plugins += [{
               name: $name,
               description: $desc,
               version: $version,
               author: {name: $author},
               source: $source,
               category: $category,
               tags: $tags,
               keywords: $keywords
             }]' "$TEMP_MARKETPLACE" > "${TEMP_MARKETPLACE}.new"

          mv "${TEMP_MARKETPLACE}.new" "$TEMP_MARKETPLACE"
        done

        # Sort plugins alphabetically by name
        jq '.plugins |= sort_by(.name)' "$TEMP_MARKETPLACE" > "${TEMP_MARKETPLACE}.sorted"
        mv "${TEMP_MARKETPLACE}.sorted" "$TEMP_MARKETPLACE"

        # Compare with current marketplace
        if ! diff -q "$MARKETPLACE_FILE" "$TEMP_MARKETPLACE" > /dev/null 2>&1; then
          echo "::notice::Marketplace has changes, updating..."
          cp "$TEMP_MARKETPLACE" "$MARKETPLACE_FILE"
          UPDATED=true
        else
          echo "::notice::No changes to marketplace"
        fi

        rm -f "$TEMP_MARKETPLACE"

        echo "::endgroup::"

        # Remove trailing comma from changed plugins
        CHANGED_PLUGINS=$(echo "$CHANGED_PLUGINS" | sed 's/,$//')

        echo "updated=${UPDATED}" >> $GITHUB_OUTPUT
        echo "changed-plugins=${CHANGED_PLUGINS}" >> $GITHUB_OUTPUT

        if [ "$UPDATED" = "true" ]; then
          echo "::notice::Marketplace updated with plugins: $CHANGED_PLUGINS"
        fi
