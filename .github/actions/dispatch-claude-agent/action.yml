name: 'Dispatch Claude Agent'
description: 'Send a repository dispatch event to trigger the Claude agent workflow'

branding:
  icon: 'send'
  color: 'orange'

inputs:
  token:
    description: 'GitHub token with permission to dispatch events'
    required: true
  event-type:
    description: 'The event type for repository dispatch (claude-agent-mention or claude-agent-new-issue)'
    required: true
  prompt:
    description: 'The prompt/request to send to Claude'
    required: true
  system-prompt-template:
    description: 'Path to system prompt template file (relative to repo root)'
    required: false
    default: '.ai/prompts/claude-agent-system.md'
  repo:
    description: 'Repository in owner/repo format'
    required: false
    default: ${{ github.repository }}
  issue-number:
    description: 'Issue number (if applicable)'
    required: false
  pr-number:
    description: 'Pull request number (if applicable)'
    required: false
  comment-id:
    description: 'Comment ID (if applicable)'
    required: false
  author-login:
    description: 'Author username'
    required: false
    default: ''
  author-association:
    description: 'Author association (OWNER, MEMBER, etc.)'
    required: false
    default: ''
  title:
    description: 'Title of the issue or PR'
    required: false
    default: ''
  # Planning-specific inputs
  planning-trigger-reason:
    description: 'Why planning was triggered (issue_created, explicit_mention, replan_label)'
    required: false
    default: ''
  original-issue-body:
    description: 'Original issue body for planning (preserved verbatim)'
    required: false
    default: ''
  comment-history:
    description: 'Comment history for replanning'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Dispatch to Claude agent
      uses: peter-evans/repository-dispatch@v4
      with:
        token: ${{ inputs.token }}
        event-type: ${{ inputs.event-type }}
        # Schema: .github/schemas/claude-agent-payload.schema.json
        client-payload: |
          {
            "prompt": ${{ toJson(inputs.prompt) }},
            "system_prompt_template": "${{ inputs.system-prompt-template }}",
            "trigger": {
              "type": "${{ github.event_name }}",
              "action": "${{ github.event.action }}"
            },
            "source": {
              "repo": "${{ inputs.repo }}",
              "issue_number": ${{ inputs.issue-number || 'null' }},
              "pr_number": ${{ inputs.pr-number || 'null' }},
              "comment_id": ${{ inputs.comment-id || 'null' }},
              "ref": "${{ github.ref }}"
            },
            "author": {
              "login": "${{ inputs.author-login }}",
              "association": "${{ inputs.author-association }}"
            },
            "content": {
              "title": ${{ toJson(inputs.title) }},
              "body": ${{ toJson(inputs.prompt) }}
            },
            "planning": {
              "trigger_reason": "${{ inputs.planning-trigger-reason }}",
              "original_issue_body": ${{ toJson(inputs.original-issue-body) }},
              "comment_history": ${{ toJson(inputs.comment-history) }}
            }
          }
