name: 'Dispatch Claude Agent'
description: 'Send a repository dispatch event to trigger the Claude agent workflow with full context'

branding:
  icon: 'send'
  color: 'orange'

inputs:
  token:
    description: 'GitHub token with permission to dispatch events'
    required: true
  prompt:
    description: 'The prompt/request to send to Claude (defaults to comment/review/issue body)'
    required: false
  event-json:
    description: 'The full github.event context as JSON'
    required: true
  event-name:
    description: 'The github.event_name value'
    required: true
  repository:
    description: 'The github.repository value'
    required: false
    default: ${{ github.repository }}
  ref:
    description: 'The github.ref value'
    required: false
    default: ${{ github.ref }}
  workflow-type:
    description: 'Type of workflow triggering this: "mention" or "new-issue"'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Build payload and dispatch
      shell: bash
      env:
        TOKEN: ${{ inputs.token }}
        EVENT_JSON: ${{ inputs.event-json }}
        EVENT_NAME: ${{ inputs.event-name }}
        REPOSITORY: ${{ inputs.repository }}
        REF: ${{ inputs.ref }}
        WORKFLOW_TYPE: ${{ inputs.workflow-type }}
        CUSTOM_PROMPT: ${{ inputs.prompt }}
      run: |
        # Extract values from event JSON based on event type
        case "$EVENT_NAME" in
          issue_comment)
            PROMPT="${CUSTOM_PROMPT:-$(echo "$EVENT_JSON" | jq -r '.comment.body // ""')}"
            ISSUE_NUMBER=$(echo "$EVENT_JSON" | jq -r '.issue.number // null')
            PR_NUMBER=$(echo "$EVENT_JSON" | jq -r 'if .issue.pull_request then .issue.number else null end')
            COMMENT_ID=$(echo "$EVENT_JSON" | jq -r '.comment.id // null')
            AUTHOR_LOGIN=$(echo "$EVENT_JSON" | jq -r '.comment.user.login // ""')
            AUTHOR_ASSOC=$(echo "$EVENT_JSON" | jq -r '.comment.author_association // ""')
            TITLE=$(echo "$EVENT_JSON" | jq -r '.issue.title // ""')
            ACTION=$(echo "$EVENT_JSON" | jq -r '.action // ""')
            ;;
          pull_request_review_comment)
            PROMPT="${CUSTOM_PROMPT:-$(echo "$EVENT_JSON" | jq -r '.comment.body // ""')}"
            ISSUE_NUMBER=null
            PR_NUMBER=$(echo "$EVENT_JSON" | jq -r '.pull_request.number // null')
            COMMENT_ID=$(echo "$EVENT_JSON" | jq -r '.comment.id // null')
            AUTHOR_LOGIN=$(echo "$EVENT_JSON" | jq -r '.comment.user.login // ""')
            AUTHOR_ASSOC=$(echo "$EVENT_JSON" | jq -r '.comment.author_association // ""')
            TITLE=$(echo "$EVENT_JSON" | jq -r '.pull_request.title // ""')
            ACTION=$(echo "$EVENT_JSON" | jq -r '.action // ""')
            ;;
          pull_request_review)
            PROMPT="${CUSTOM_PROMPT:-$(echo "$EVENT_JSON" | jq -r '.review.body // ""')}"
            ISSUE_NUMBER=null
            PR_NUMBER=$(echo "$EVENT_JSON" | jq -r '.pull_request.number // null')
            COMMENT_ID=$(echo "$EVENT_JSON" | jq -r '.review.id // null')
            AUTHOR_LOGIN=$(echo "$EVENT_JSON" | jq -r '.review.user.login // ""')
            AUTHOR_ASSOC=$(echo "$EVENT_JSON" | jq -r '.review.author_association // ""')
            TITLE=$(echo "$EVENT_JSON" | jq -r '.pull_request.title // ""')
            ACTION=$(echo "$EVENT_JSON" | jq -r '.action // ""')
            ;;
          issues)
            PROMPT="${CUSTOM_PROMPT:-$(echo "$EVENT_JSON" | jq -r '.issue.body // ""')}"
            ISSUE_NUMBER=$(echo "$EVENT_JSON" | jq -r '.issue.number // null')
            PR_NUMBER=null
            COMMENT_ID=null
            AUTHOR_LOGIN=$(echo "$EVENT_JSON" | jq -r '.issue.user.login // ""')
            AUTHOR_ASSOC=$(echo "$EVENT_JSON" | jq -r '.issue.author_association // ""')
            TITLE=$(echo "$EVENT_JSON" | jq -r '.issue.title // ""')
            ACTION=$(echo "$EVENT_JSON" | jq -r '.action // ""')
            ;;
          *)
            echo "Unknown event type: $EVENT_NAME"
            exit 1
            ;;
        esac

        # Build the payload JSON
        # Schema: .github/schemas/claude-agent-payload.schema.json
        PAYLOAD=$(jq -n \
          --arg prompt "$PROMPT" \
          --arg trigger_type "$EVENT_NAME" \
          --arg trigger_action "$ACTION" \
          --arg repo "$REPOSITORY" \
          --argjson issue_number "$ISSUE_NUMBER" \
          --argjson pr_number "$PR_NUMBER" \
          --argjson comment_id "$COMMENT_ID" \
          --arg ref "$REF" \
          --arg author_login "$AUTHOR_LOGIN" \
          --arg author_assoc "$AUTHOR_ASSOC" \
          --arg title "$TITLE" \
          --arg workflow_type "$WORKFLOW_TYPE" \
          '{
            prompt: $prompt,
            trigger: {
              type: $trigger_type,
              action: $trigger_action
            },
            source: {
              repo: $repo,
              issue_number: $issue_number,
              pr_number: $pr_number,
              comment_id: $comment_id,
              ref: $ref
            },
            author: {
              login: $author_login,
              association: $author_assoc
            },
            content: {
              title: $title,
              body: $prompt
            },
            workflow_type: $workflow_type
          }')

        # Dispatch the event
        gh api repos/$REPOSITORY/dispatches \
          -X POST \
          -H "Accept: application/vnd.github+json" \
          -f event_type=claude-agent \
          --input - <<< "{\"client_payload\": $PAYLOAD}"

        echo "Dispatched claude-agent event for $WORKFLOW_TYPE workflow"
