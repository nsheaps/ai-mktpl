name: 'Interpolate Prompt'
description: 'Interpolate a prompt template with JSON payload using gomplate'

branding:
  icon: 'file-text'
  color: 'purple'

inputs:
  template-file:
    description: 'Path to the prompt template file (relative to repository root)'
    required: true
  payload:
    description: 'JSON payload to use for interpolation'
    required: true

outputs:
  prompt:
    description: 'The interpolated prompt content'
    value: ${{ steps.interpolate.outputs.prompt }}

runs:
  using: 'composite'
  steps:
    - name: Interpolate template
      id: interpolate
      shell: bash
      env:
        PAYLOAD: ${{ inputs.payload }}
        TEMPLATE_FILE: ${{ inputs.template-file }}
      run: |
        if [[ ! -f "$TEMPLATE_FILE" ]]; then
          echo "::error::Template file not found: $TEMPLATE_FILE"
          exit 1
        fi

        # Use gomplate with JSON payload as root context (enables {{ .field }} syntax)
        # --missing-key=zero returns empty values for missing fields instead of errors
        INTERPOLATED=$(echo "$PAYLOAD" | gomplate --missing-key=zero -c '.=stdin:?type=application/json' -f "$TEMPLATE_FILE")

        # Output using delimiter for multiline content
        DELIMITER="EOF_$(date +%s%N)"
        {
          echo "prompt<<$DELIMITER"
          echo "$INTERPOLATED"
          echo "$DELIMITER"
        } >> "$GITHUB_OUTPUT"
