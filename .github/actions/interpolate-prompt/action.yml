name: 'Interpolate Prompt'
description: 'Interpolate a prompt template with JSON payload data using {{.path}} syntax'

branding:
  icon: 'file-text'
  color: 'purple'

inputs:
  template-file:
    description: 'Path to the prompt template file (relative to repository root)'
    required: true
  payload:
    description: 'JSON payload to use for interpolation'
    required: true

outputs:
  prompt:
    description: 'The interpolated prompt content'
    value: ${{ steps.interpolate.outputs.prompt }}

runs:
  using: 'composite'
  steps:
    - name: Interpolate template
      id: interpolate
      shell: bash
      env:
        PAYLOAD: ${{ inputs.payload }}
        TEMPLATE_FILE: ${{ inputs.template-file }}
      run: |
        if [[ ! -f "$TEMPLATE_FILE" ]]; then
          echo "::error::Template file not found: $TEMPLATE_FILE"
          exit 1
        fi

        # Read template
        TEMPLATE=$(cat "$TEMPLATE_FILE")

        # Process {{#if .path}}...{{/if}} conditionals first
        # Matches: {{#if .path}}content{{/if}}
        while [[ "$TEMPLATE" =~ \{\{#if\ \.([^}]+)\}\}(.*)\{\{/if\}\} ]]; do
          FULL_MATCH="${BASH_REMATCH[0]}"
          JSON_PATH="${BASH_REMATCH[1]}"
          CONTENT="${BASH_REMATCH[2]}"
          VALUE=$(echo "$PAYLOAD" | jq -r ".$JSON_PATH // empty")
          if [[ -n "$VALUE" && "$VALUE" != "null" ]]; then
            TEMPLATE="${TEMPLATE//$FULL_MATCH/$CONTENT}"
          else
            TEMPLATE="${TEMPLATE//$FULL_MATCH/}"
          fi
        done

        # Process {{.path}} replacements
        # Use a temp file to handle special characters properly
        echo "$TEMPLATE" > /tmp/template_processing.txt

        # Find all {{.path}} patterns and replace with jq values
        grep -oE '\{\{\.[^}]+\}\}' /tmp/template_processing.txt | sort -u | while read -r PATTERN; do
          # Extract the path (remove {{ and }})
          JSON_PATH="${PATTERN#\{\{.}"
          JSON_PATH="${JSON_PATH%\}\}}"
          # Get value from payload
          VALUE=$(echo "$PAYLOAD" | jq -r ".$JSON_PATH // \"\"")
          # Escape special characters for sed
          ESCAPED_PATTERN=$(printf '%s\n' "$PATTERN" | sed 's/[[\.*^$()+?{|]/\\&/g')
          ESCAPED_VALUE=$(printf '%s\n' "$VALUE" | sed 's/[&/\]/\\&/g')
          # Replace in file
          sed -i.bak "s|$ESCAPED_PATTERN|$ESCAPED_VALUE|g" /tmp/template_processing.txt
        done

        INTERPOLATED=$(cat /tmp/template_processing.txt)
        rm -f /tmp/template_processing.txt /tmp/template_processing.txt.bak

        # Output using delimiter for multiline content
        DELIMITER="EOF_$(date +%s%N)"
        {
          echo "prompt<<$DELIMITER"
          echo "$INTERPOLATED"
          echo "$DELIMITER"
        } >> "$GITHUB_OUTPUT"
