name: Check Version Bump
description: Verify that plugin versions are bumped when files change

inputs:
  base-ref:
    description: Base git reference to compare against
    required: true
  head-ref:
    description: Head git reference to compare
    required: true

outputs:
  valid:
    description: Whether all changed plugins have version bumps
    value: ${{ steps.check.outputs.valid }}
  missing-bumps:
    description: Plugins that need version bumps
    value: ${{ steps.check.outputs.missing-bumps }}

runs:
  using: composite
  steps:
    - name: Setup svu
      shell: bash
      run: |
        echo "::group::Installing svu"
        curl -sL https://github.com/caarlos0/svu/releases/download/v1.12.0/svu_1.12.0_linux_amd64.tar.gz | tar xz
        sudo mv svu /usr/local/bin/
        svu --version
        echo "::endgroup::"

    - name: Check version bumps
      id: check
      shell: bash
      run: |
        set +e

        echo "::group::Checking for plugin changes"

        VALID=true
        MISSING_BUMPS=""

        # Get changed files in plugins directory
        CHANGED_FILES=$(git diff --name-only ${{ inputs.base-ref }}...${{ inputs.head-ref }} -- 'plugins/*')

        if [ -z "$CHANGED_FILES" ]; then
          echo "::notice::No plugin files changed"
          echo "valid=true" >> $GITHUB_OUTPUT
          echo "missing-bumps=" >> $GITHUB_OUTPUT
          exit 0
        fi

        echo "Changed files:"
        echo "$CHANGED_FILES"

        # Extract unique plugin names from changed files
        CHANGED_PLUGINS=$(echo "$CHANGED_FILES" | grep '^plugins/' | cut -d/ -f2 | sort -u)

        echo "::endgroup::"

        echo "::group::Validating version bumps"

        for plugin in $CHANGED_PLUGINS; do
          echo "Checking plugin: $plugin"

          PLUGIN_JSON="plugins/$plugin/.claude-plugin/plugin.json"

          if [ ! -f "$PLUGIN_JSON" ]; then
            echo "::warning::Plugin $plugin has no plugin.json, skipping version check"
            continue
          fi

          # Get current version
          CURRENT_VERSION=$(jq -r '.version' "$PLUGIN_JSON")

          # Get version from base ref
          BASE_VERSION=$(git show ${{ inputs.base-ref }}:$PLUGIN_JSON 2>/dev/null | jq -r '.version' 2>/dev/null || echo "0.0.0")

          echo "  Current version: $CURRENT_VERSION"
          echo "  Base version: $BASE_VERSION"

          # Compare versions
          if [ "$CURRENT_VERSION" = "$BASE_VERSION" ]; then
            echo "::error::Plugin $plugin modified but version not bumped (still $CURRENT_VERSION)"
            VALID=false
            MISSING_BUMPS="${MISSING_BUMPS}${plugin},"

            # Suggest next version using svu
            cd "plugins/$plugin" 2>/dev/null || continue
            SUGGESTED_PATCH=$(echo "$BASE_VERSION" | awk -F. '{printf "%d.%d.%d", $1, $2, $3+1}')
            SUGGESTED_MINOR=$(echo "$BASE_VERSION" | awk -F. '{printf "%d.%d.%d", $1, $2+1, 0}')
            SUGGESTED_MAJOR=$(echo "$BASE_VERSION" | awk -F. '{printf "%d.%d.%d", $1+1, 0, 0}')

            echo "::notice::Suggested versions for $plugin:"
            echo "::notice::  - Patch: $SUGGESTED_PATCH (bug fixes)"
            echo "::notice::  - Minor: $SUGGESTED_MINOR (new features)"
            echo "::notice::  - Major: $SUGGESTED_MAJOR (breaking changes)"

            cd - > /dev/null
          else
            # Validate version is greater than base
            CURRENT_MAJOR=$(echo "$CURRENT_VERSION" | cut -d. -f1)
            CURRENT_MINOR=$(echo "$CURRENT_VERSION" | cut -d. -f2)
            CURRENT_PATCH=$(echo "$CURRENT_VERSION" | cut -d. -f3)

            BASE_MAJOR=$(echo "$BASE_VERSION" | cut -d. -f1)
            BASE_MINOR=$(echo "$BASE_VERSION" | cut -d. -f2)
            BASE_PATCH=$(echo "$BASE_VERSION" | cut -d. -f3)

            VERSION_VALID=false

            if [ "$CURRENT_MAJOR" -gt "$BASE_MAJOR" ]; then
              VERSION_VALID=true
            elif [ "$CURRENT_MAJOR" -eq "$BASE_MAJOR" ] && [ "$CURRENT_MINOR" -gt "$BASE_MINOR" ]; then
              VERSION_VALID=true
            elif [ "$CURRENT_MAJOR" -eq "$BASE_MAJOR" ] && [ "$CURRENT_MINOR" -eq "$BASE_MINOR" ] && [ "$CURRENT_PATCH" -gt "$BASE_PATCH" ]; then
              VERSION_VALID=true
            fi

            if [ "$VERSION_VALID" = "true" ]; then
              echo "::notice::✓ Plugin $plugin version properly bumped: $BASE_VERSION -> $CURRENT_VERSION"
            else
              echo "::error::Plugin $plugin version decreased: $BASE_VERSION -> $CURRENT_VERSION"
              VALID=false
              MISSING_BUMPS="${MISSING_BUMPS}${plugin},"
            fi
          fi
        done

        echo "::endgroup::"

        # Remove trailing comma
        MISSING_BUMPS=$(echo "$MISSING_BUMPS" | sed 's/,$//')

        echo "valid=${VALID}" >> $GITHUB_OUTPUT
        echo "missing-bumps=${MISSING_BUMPS}" >> $GITHUB_OUTPUT

        if [ "$VALID" = "true" ]; then
          echo "::notice::All changed plugins have proper version bumps"
          exit 0
        else
          echo "::error::Version bump validation failed for: $MISSING_BUMPS"
          exit 1
        fi
