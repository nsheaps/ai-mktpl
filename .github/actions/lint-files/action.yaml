name: Lint Files
description: Lint YAML, JSON, Markdown, TypeScript, JavaScript, and Python files

inputs:
  fix:
    description: Whether to auto-fix lint issues
    required: false
    default: 'false'

outputs:
  has-errors:
    description: Whether lint errors were found
    value: ${{ steps.lint.outputs.has-errors }}
  error-count:
    description: Number of lint errors found
    value: ${{ steps.lint.outputs.error-count }}

runs:
  using: composite
  steps:
    - name: Run linters
      id: lint
      shell: bash
      run: |
        set +e
        ERROR_COUNT=0
        HAS_ERRORS=false

        echo "::group::Linting YAML, JSON, and Markdown files with Prettier"
        prettier --check "**/*.{yaml,yml,json,md}" || {
          if [ "${{ inputs.fix }}" = "true" ]; then
            prettier --write "**/*.{yaml,yml,json,md}"
          fi
          ERROR_COUNT=$((ERROR_COUNT + 1))
          HAS_ERRORS=true
        }
        echo "::endgroup::"

        echo "::group::Linting TypeScript/JavaScript files"
        if [ -f "package.json" ]; then
          eslint "**/*.{ts,js,tsx,jsx}" --max-warnings 0 || {
            if [ "${{ inputs.fix }}" = "true" ]; then
              eslint "**/*.{ts,js,tsx,jsx}" --fix || true
            fi
            ERROR_COUNT=$((ERROR_COUNT + 1))
            HAS_ERRORS=true
          }
        fi
        echo "::endgroup::"

        echo "::group::Linting Python files"
        if find . -name "*.py" -not -path "*/\.*" | grep -q .; then
          black --check . || {
            if [ "${{ inputs.fix }}" = "true" ]; then
              black .
            fi
            ERROR_COUNT=$((ERROR_COUNT + 1))
            HAS_ERRORS=true
          }

          flake8 . || {
            ERROR_COUNT=$((ERROR_COUNT + 1))
            HAS_ERRORS=true
          }

          isort --check-only . || {
            if [ "${{ inputs.fix }}" = "true" ]; then
              isort .
            fi
            ERROR_COUNT=$((ERROR_COUNT + 1))
            HAS_ERRORS=true
          }
        fi
        echo "::endgroup::"

        echo "has-errors=${HAS_ERRORS}" >> $GITHUB_OUTPUT
        echo "error-count=${ERROR_COUNT}" >> $GITHUB_OUTPUT

        if [ "${HAS_ERRORS}" = "true" ]; then
          echo "::warning::Found ${ERROR_COUNT} lint issue(s)"
        else
          echo "::notice::All files passed linting checks"
        fi
