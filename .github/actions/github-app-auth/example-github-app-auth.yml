name: Example - GitHub App Authentication

on:
  workflow_dispatch:

jobs:
  basic-auth:
    runs-on: ubuntu-latest
    name: Basic GitHub App Authentication
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate as GitHub App
        id: auth
        uses: ./.github/actions/github-app-auth
        with:
          app-id: ${{ secrets.AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.AUTOMATION_GITHUB_APP_PRIVATE_KEY }}

      - name: Verify authentication
        run: |
          echo "✓ Authenticated as: ${{ steps.auth.outputs.app-slug }}[bot]"
          echo "✓ User ID: ${{ steps.auth.outputs.user-id }}"
          echo "✓ Git config:"
          git config user.name
          git config user.email

      - name: Use token for git operations
        run: |
          # The token is available for subsequent git operations
          # Git is already configured with the app's identity
          echo "Token is available: ${GH_TOKEN:0:10}..."
        env:
          GH_TOKEN: ${{ steps.auth.outputs.token }}

  auth-and-commit:
    runs-on: ubuntu-latest
    name: Authenticate and Make Changes
    permissions:
      contents: write

    steps:
      - name: Authenticate as GitHub App
        id: auth
        uses: ./.github/actions/github-app-auth
        with:
          app-id: ${{ secrets.AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.AUTOMATION_GITHUB_APP_PRIVATE_KEY }}

      - name: Checkout with app token
        uses: actions/checkout@v4
        with:
          token: ${{ steps.auth.outputs.token }}

      - name: Make a change and commit
        run: |
          # Git is already configured with the app's bot identity
          echo "# Test file" > test.md
          git add test.md
          git commit -m "chore: add test file" || echo "Nothing to commit"
          # Uncomment to push:
          # git push
