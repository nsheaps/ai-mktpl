name: 'GitHub App Authentication'
description: 'Authenticate as a GitHub App and configure git user settings'
author: 'Claude Code Marketplace'

branding:
  icon: 'lock'
  color: 'blue'

inputs:
  app-id:
    description: 'GitHub App ID'
    required: true

  private-key:
    description: 'GitHub App private key'
    required: true

  owner:
    description: 'Repository owner (defaults to current repository owner)'
    required: false
    default: ${{ github.repository_owner }}

outputs:
  token:
    description: 'GitHub App token'
    value: ${{ steps.app-token.outputs.token }}

  app-slug:
    description: 'GitHub App slug name'
    value: ${{ steps.app-token.outputs.app-slug }}

  user-id:
    description: 'GitHub App bot user ID'
    value: ${{ steps.get-user-id.outputs.user-id }}

runs:
  using: 'composite'
  steps:
    - name: Generate GitHub App token
      id: app-token
      uses: actions/create-github-app-token@v2
      with:
        app-id: ${{ inputs.app-id }}
        private-key: ${{ inputs.private-key }}
        owner: ${{ inputs.owner }}

    - name: Get GitHub App User ID
      id: get-user-id
      shell: bash
      run: echo "user-id=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"
      env:
        GH_TOKEN: ${{ steps.app-token.outputs.token }}

    - name: Configure git
      shell: bash
      env:
        GH_TOKEN: ${{ steps.app-token.outputs.token }}
      run: |
        git config --global user.name '${{ steps.app-token.outputs.app-slug }}[bot]'
        git config --global user.email '${{ steps.get-user-id.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com'
        gh auth setup-git

    - name: Configure repo checkout token
      # technically would checkout again, but since all refs are already local and clean is disabled
      # this should basically just replace the token in the http header used to interact with remote
      uses: actions/checkout@v5
      with:
        token: ${{ steps.app-token.outputs.token }}
        clean: false
        persist-credentials: true
