name: Claude Agent - New Issue

# Handles new issue events for auto-planning:
# - New issues without @claude (auto-plan)
# - New issues with @claude plan/implement/design/create (explicit plan)
# - Replan label added
#
# Special handling: If a new issue contains @claude but isn't asking for planning,
# we still plan it first, then dispatch to the mention workflow for the specific work.

on:
  issues:
    types: [opened, labeled]

jobs:
  # =============================================================================
  # Auto-planning: New issue without @claude mention
  # =============================================================================
  auto-plan:
    if: >-
      github.event.action == 'opened' &&
      github.event.issue.user.type != 'Bot' &&
      !contains(github.event.issue.body, '@claude')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: read
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Check if issue already has plan structure
        id: check
        run: |
          BODY='${{ toJson(github.event.issue.body) }}'

          # Detect if body already looks like a plan
          if echo "$BODY" | grep -qiE '## (Implementation|Overview|Acceptance Criteria)'; then
            echo "has_plan=true" >> $GITHUB_OUTPUT
          elif echo "$BODY" | grep -qiE '<details>.*<summary>.*[Oo]riginal'; then
            echo "has_plan=true" >> $GITHUB_OUTPUT
          elif echo "$BODY" | grep -qiE '### Step [0-9]+'; then
            echo "has_plan=true" >> $GITHUB_OUTPUT
          else
            echo "has_plan=false" >> $GITHUB_OUTPUT
          fi

      - name: Authenticate as GitHub App
        if: steps.check.outputs.has_plan != 'true'
        id: auth
        uses: ./.github/actions/github-app-auth
        with:
          app-id: ${{ secrets.AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.AUTOMATION_GITHUB_APP_PRIVATE_KEY }}

      - name: Dispatch to Claude agent for planning
        if: steps.check.outputs.has_plan != 'true'
        uses: ./.github/actions/dispatch-claude-agent
        with:
          token: ${{ steps.auth.outputs.token }}
          event-type: claude-agent-new-issue
          prompt: ${{ github.event.issue.body }}
          system-prompt-template: .ai/prompts/issue-planner-system.md
          issue-number: ${{ github.event.issue.number }}
          author-login: ${{ github.event.issue.user.login }}
          author-association: ${{ github.event.issue.author_association }}
          title: ${{ github.event.issue.title }}
          planning-trigger-reason: issue_created
          original-issue-body: ${{ github.event.issue.body }}

  # =============================================================================
  # New issue with @claude: Plan first, then dispatch for mention work if needed
  # =============================================================================
  new-issue-with-mention:
    if: >-
      github.event.action == 'opened' &&
      contains(github.event.issue.body, '@claude')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: read
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Detect request type
        id: detect
        run: |
          BODY='${{ toJson(github.event.issue.body) }}'

          # Check if asking for planning explicitly
          if echo "$BODY" | grep -qiE '@claude.*(plan|implement|design|create)'; then
            echo "is_planning_request=true" >> $GITHUB_OUTPUT
            echo "needs_followup_dispatch=false" >> $GITHUB_OUTPUT
          else
            # @claude mention but not asking for planning - plan first, then dispatch
            echo "is_planning_request=false" >> $GITHUB_OUTPUT
            echo "needs_followup_dispatch=true" >> $GITHUB_OUTPUT
          fi

      - name: Authenticate as GitHub App
        id: auth
        uses: ./.github/actions/github-app-auth
        with:
          app-id: ${{ secrets.AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.AUTOMATION_GITHUB_APP_PRIVATE_KEY }}

      # For explicit planning requests (@claude plan this), just plan
      - name: Dispatch for explicit planning
        if: steps.detect.outputs.is_planning_request == 'true'
        uses: ./.github/actions/dispatch-claude-agent
        with:
          token: ${{ steps.auth.outputs.token }}
          event-type: claude-agent-new-issue
          prompt: ${{ github.event.issue.body }}
          system-prompt-template: .ai/prompts/issue-planner-system.md
          issue-number: ${{ github.event.issue.number }}
          author-login: ${{ github.event.issue.user.login }}
          author-association: ${{ github.event.issue.author_association }}
          title: ${{ github.event.issue.title }}
          planning-trigger-reason: explicit_mention
          original-issue-body: ${{ github.event.issue.body }}

      # For @claude mentions that aren't planning requests:
      # Dispatch to mention workflow to handle the specific work
      # (Don't auto-plan since they're asking for specific work)
      - name: Dispatch for mention work
        if: steps.detect.outputs.needs_followup_dispatch == 'true'
        uses: ./.github/actions/dispatch-claude-agent
        with:
          token: ${{ steps.auth.outputs.token }}
          event-type: claude-agent-mention
          prompt: ${{ github.event.issue.body }}
          issue-number: ${{ github.event.issue.number }}
          author-login: ${{ github.event.issue.user.login }}
          author-association: ${{ github.event.issue.author_association }}
          title: ${{ github.event.issue.title }}

  # =============================================================================
  # Replan: Issue labeled with 'replan'
  # =============================================================================
  replan:
    if: >-
      github.event.action == 'labeled' &&
      github.event.label.name == 'replan'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: read
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Authenticate as GitHub App
        id: auth
        uses: ./.github/actions/github-app-auth
        with:
          app-id: ${{ secrets.AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.AUTOMATION_GITHUB_APP_PRIVATE_KEY }}

      - name: Fetch comment history
        id: comments
        run: |
          COMMENTS=$(gh api repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments --jq '[.[].body] | join("\n\n---\n\n")')
          {
            echo "history<<EOF_HISTORY"
            echo "$COMMENTS"
            echo "EOF_HISTORY"
          } >> "$GITHUB_OUTPUT"

      - name: Dispatch to Claude agent for replanning
        uses: ./.github/actions/dispatch-claude-agent
        with:
          token: ${{ steps.auth.outputs.token }}
          event-type: claude-agent-new-issue
          prompt: ${{ github.event.issue.body }}
          system-prompt-template: .ai/prompts/issue-planner-system.md
          issue-number: ${{ github.event.issue.number }}
          author-login: ${{ github.event.issue.user.login }}
          author-association: ${{ github.event.issue.author_association }}
          title: ${{ github.event.issue.title }}
          planning-trigger-reason: replan_label
          original-issue-body: ${{ github.event.issue.body }}
          comment-history: ${{ steps.comments.outputs.history }}
