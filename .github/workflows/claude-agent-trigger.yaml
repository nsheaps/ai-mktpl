name: Claude Agent Trigger

# Detects events that should trigger Claude agent and dispatches to agent workflow
# Mirrors the original claude.yaml structure - ONE job, conditional logic

on:
  # Note: Runs from default branch (main), even if triggered on PR
  issue_comment:
    types: [created, edited]
  pull_request_review_comment:
    types: [created, edited]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  dispatch:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Dispatch to Claude agent
        uses: peter-evans/repository-dispatch@v3
        with:
          event-type: claude-agent
          client-payload: |-
            {
              "github": ${{ toJson(github) }}
            }
