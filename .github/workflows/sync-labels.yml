name: Sync Labels

on:
  push:
    branches:
      - main
    paths:
      - .github/labels.yaml
  workflow_dispatch:

concurrency:
  group: sync-labels-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync-labels:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Sync labels
        uses: crazy-max/ghaction-github-labeler@v5
        with:
          yaml-file: .github/labels.yaml
          skip-delete: true
