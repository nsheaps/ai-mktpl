name: Daily Report

# Generates a daily activity report for the nsheaps GitHub org
# Runs at 4:00 AM ET (9:00 AM UTC) and covers the previous calendar day (Eastern Time)
# Can also be triggered manually with custom time and subject scopes

on:
  schedule:
    # 4:00 AM ET = 9:00 AM UTC (during EDT)
    # During EST this runs at 4:00 AM EST = 9:00 AM UTC
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      time_scope:
        description: >
          Free-form time scope for the report. Examples: "1 day" (default),
          "3 days", "1 week", "since 2026-03-01"
        required: false
        default: '1 day'
        type: string
      subject_scope:
        description: >
          Free-form subject scope for the report. Examples: "nsheaps" (default, entire org),
          "nsheaps/ai-mktpl" (specific repo), "commits from user@example.com across nsheaps",
          "summarize recent activity for nsheaps/my-project",
          "PRs by nsheaps across all repos"
        required: false
        default: 'nsheaps'
        type: string

jobs:
  generate-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Install mise
        uses: jdx/mise-action@v3
        with:
          install: true

      - name: Authenticate as GitHub App
        id: auth
        uses: ./.github/actions/github-app-auth
        with:
          app-id: ${{ secrets.AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.AUTOMATION_GITHUB_APP_PRIVATE_KEY }}

      - name: Compute report parameters
        id: params
        shell: bash
        run: |
          # Determine report date (previous calendar day in Eastern Time)
          REPORT_DATE=$(TZ='America/New_York' date -d 'yesterday' '+%Y-%m-%d')
          echo "report_date=${REPORT_DATE}" >> "$GITHUB_OUTPUT"

          # Time scope: from workflow_dispatch input or default "1 day"
          TIME_SCOPE="${{ inputs.time_scope || '1 day' }}"
          echo "time_scope=${TIME_SCOPE}" >> "$GITHUB_OUTPUT"

          # Subject scope: from workflow_dispatch input or default "nsheaps"
          SUBJECT_SCOPE="${{ inputs.subject_scope || 'nsheaps' }}"
          echo "subject_scope=${SUBJECT_SCOPE}" >> "$GITHUB_OUTPUT"

      - name: Ensure daily-report label exists
        shell: bash
        env:
          GH_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          gh label create daily-report \
            --description "Auto-generated daily activity report" \
            --color "0e8a16" \
            --force \
            -R "${{ github.repository }}"

      - name: Build prompt
        id: prompt
        shell: bash
        run: |
          REPORT_DATE="${{ steps.params.outputs.report_date }}"
          TIME_SCOPE="${{ steps.params.outputs.time_scope }}"
          SUBJECT_SCOPE="${{ steps.params.outputs.subject_scope }}"

          PROMPT=$(cat <<'PROMPT_EOF'
          You are generating a daily activity report. Use the daily-report skill from the daily-report plugin.

          ## Parameters

          - **Report Date**: REPORT_DATE_PLACEHOLDER
          - **Time Scope**: TIME_SCOPE_PLACEHOLDER
          - **Subject Scope**: SUBJECT_SCOPE_PLACEHOLDER

          ## Instructions

          1. Use `gh` CLI to gather data from all repositories in the scope. The GH_TOKEN is already configured.
          2. Follow the daily-report skill instructions exactly for data gathering:
             - List active repos in the org/scope
             - Gather commits across all branches per repo
             - Detect force pushes and trace previous commit trees (try audit log first, fall back to events API)
             - Gather PR activity (opened, merged, closed, updated)
             - Track branch creation and deletion
             - Report issue changes with state reasons (completed vs not_planned)
          3. Generate the full report in GitHub-flavored Markdown following the skill's report format
          4. Post the report as a GitHub issue using `mcp__github__create_issue` with:
             - owner: "nsheaps"
             - repo: "ai-mktpl"
             - title: "REPORT_DATE_PLACEHOLDER Daily Report"
             - labels: ["daily-report"]
             - body: the full report markdown

          ## Important

          - All times should be displayed in US Eastern Time
          - All SHAs, issue numbers, and PR numbers must be clickable markdown links
          - Sort repos alphabetically, commits chronologically
          - Skip repos with zero activity
          - If any API calls fail or are rate-limited, note it in the Methodology section
          - Do NOT include repos that had no activity in the time window
          PROMPT_EOF

          # Substitute placeholders
          PROMPT="${PROMPT//REPORT_DATE_PLACEHOLDER/$REPORT_DATE}"
          PROMPT="${PROMPT//TIME_SCOPE_PLACEHOLDER/$TIME_SCOPE}"
          PROMPT="${PROMPT//SUBJECT_SCOPE_PLACEHOLDER/$SUBJECT_SCOPE}"

          {
            echo "prompt<<EOF"
            echo "$PROMPT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        env:
          INPUT_SETTINGS_JSON: |
            {
              "permissions": {
                "allow": [
                  "Task",
                  "Glob",
                  "Grep",
                  "LS",
                  "Read",
                  "TodoWrite",
                  "WebSearch",
                  "WebFetch",
                  "Bash",
                  "BashOutput",
                  "Skill",
                  "mcp__github__create_issue",
                  "mcp__github__add_issue_comment",
                  "mcp__github__get_issue",
                  "mcp__github__list_issues",
                  "mcp__github__search_issues",
                  "mcp__github__list_commits",
                  "mcp__github__get_commit",
                  "mcp__github__list_pull_requests",
                  "mcp__github__get_pull_request",
                  "mcp__github__list_branches",
                  "mcp__github__search_repositories",
                  "mcp__github__get_file_contents",
                  "mcp__github__get_me"
                ]
              },
              "model": "opus",
              "env": {
                "GH_PAGER": "cat",
                "GH_PROMPT_DISABLED": "true",
                "GH_BROWSER": "curl",
                "CLAUDE_CODE_REMOTE": "true"
              }
            }
        with:
          anthropic_api_key: ${{
            secrets.CLAUDE_API_KEY && secrets.CLAUDE_API_KEY ||
            ( secrets.ANTHROPIC_API_KEY && secrets.ANTHROPIC_API_KEY || '' ) }}
          claude_code_oauth_token: ${{
            secrets.CLAUDE_API_KEY && '' ||
            ( secrets.ANTHROPIC_API_KEY && '' || secrets.CLAUDE_CODE_OAUTH_TOKEN ) }}
          bot_id: ${{ steps.auth.outputs.user-id }}
          bot_name: '@claude via ${{ steps.auth.outputs.user-name }}'
          allowed_bots: 'github-actions[bot],automation-nsheaps[bot]'
          github_token: ${{ steps.auth.outputs.token }}
          prompt: ${{ steps.prompt.outputs.prompt }}
          show_full_output: true
          additional_permissions: |
            actions: read
          settings: ${{ env.INPUT_SETTINGS_JSON }}
          claude_args: >-
            --allowedTools
            mcp__github__*
