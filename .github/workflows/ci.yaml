name: ci

'on':
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fail if plugin.json or marketplace.json were manually changed in a PR
  # These files are auto-generated by CD workflow on main
  check-version-files:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch origin ${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}

      - name: Check for manual version file changes
        shell: bash
        run: |
          # Check if any plugin.json or marketplace.json files were MODIFIED (not newly added)
          # New plugin.json files are expected when adding new plugins
          MODIFIED_VERSION_FILES=$(git diff --diff-filter=M --name-only "origin/${{ github.base_ref }}..HEAD" -- \
            'plugins/*/.claude-plugin/plugin.json' \
          )

          # marketplace.json should never be manually changed (always auto-generated by CD)
          CHANGED_MARKETPLACE=$(git diff --name-only "origin/${{ github.base_ref }}..HEAD" -- \
            '.claude-plugin/marketplace.json' \
          )

          ISSUES=""
          if [ -n "$MODIFIED_VERSION_FILES" ]; then
            ISSUES="${ISSUES}Modified plugin.json files (version bumps are automatic on merge):\n${MODIFIED_VERSION_FILES}\n\n"
          fi
          if [ -n "$CHANGED_MARKETPLACE" ]; then
            ISSUES="${ISSUES}marketplace.json was manually changed (auto-generated by CD on merge):\n${CHANGED_MARKETPLACE}\n\n"
          fi

          if [ -n "$ISSUES" ]; then
            echo "❌ ERROR: Version files should not be manually changed in PRs!"
            echo ""
            echo -e "$ISSUES"
            echo "Version bumps happen automatically when PRs are merged to main."
            echo "Please revert these changes:"
            echo "  git checkout origin/${{ github.base_ref }} -- <files listed above>"
            exit 1
          fi

          echo "✅ No manual version file changes detected"

  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Authenticate as GitHub App
        id: auth
        uses: ./.github/actions/github-app-auth
        with:
          app-id: ${{ secrets.AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.AUTOMATION_GITHUB_APP_PRIVATE_KEY }}

      - name: mise install -y
        uses: jdx/mise-action@v3
        with:
          install: true
          cache: true

      - name: just lint
        id: lint
        #
        uses: ./.github/actions/lint-files
        with:
          fix: 'true'
        continue-on-error: true

      - name: git push
        if: steps.lint.outputs.changed-or-failed == 'true' && ! cancelled()
        id: auto-commit-action
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: 'chore: `just lint`'

      - name: 'exit 1 # changes detected or linting failed'
        if: ${{ steps.lint.outputs.changed-or-failed == 'true' && ! cancelled() }}
        run: |
          echo "Changes made or lint failed! Auto-committed the fixes, but more lint and format issues may remain."
          exit 1

  validate:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: mise install -y
        uses: jdx/mise-action@v3
        with:
          install: true
          cache: true

      - name: Validate plugin structure
        uses: ./.github/actions/validate-plugins
