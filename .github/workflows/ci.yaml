name: ci

'on':
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Authenticate as GitHub App
        id: auth
        uses: ./.github/actions/github-app-auth
        with:
          app-id: ${{ secrets.AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.AUTOMATION_GITHUB_APP_PRIVATE_KEY }}

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ steps.auth.outputs.token }}

      - name: mise install -y
        uses: jdx/mise-action@v2
        with:
          install: true
          cache: true

      - name: just lint
        id: lint
        #
        uses: ./.github/actions/lint-files
        with:
          fix: 'true'
        continue-on-error: true

      - name: git push
        if: steps.lint.outputs.changed-or-failed == 'true' && ! cancelled()
        id: auto-commit-action
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: `just lint`'

      - name: 'exit 1 # changes detected or linting failed'
        if: ${{ steps.lint.outputs.changed-or-failed == 'true' && ! cancelled() }}
        run: |
          echo "Changes made or lint failed! Auto-committed the fixes, but more lint and format issues may remain."
          exit 1

  validate:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: mise install -y
        uses: jdx/mise-action@v2
        with:
          install: true
          cache: true

      - name: Validate plugin structure
        uses: ./.github/actions/validate-plugins
