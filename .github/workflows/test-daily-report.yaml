name: Test Daily Report

# Temporary workflow to trigger the daily report workflow on push for testing.
# This will be removed before merge.

on:
  push:
    branches:
      - claude/fix-daily-report-workflow-u0Y02
    paths:
      - '.github/workflows/daily-report.yaml'
      - '.github/prompts/daily-report.md'
      - '.github/workflows/test-daily-report.yaml'

jobs:
  trigger:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Authenticate as GitHub App
        id: auth
        uses: ./.github/actions/github-app-auth
        with:
          app-id: ${{ secrets.AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.AUTOMATION_GITHUB_APP_PRIVATE_KEY }}

      - name: Trigger daily report workflow
        env:
          GH_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          gh workflow run daily-report.yaml \
            --ref "claude/fix-daily-report-workflow-u0Y02" \
            -f time_scope="1 day" \
            -f subject_scope="nsheaps"
