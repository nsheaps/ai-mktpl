# This duplicates claude-code-review.yaml. Update that file, get rid of this, saving the important things. The other workflow works....this most definitely doesnt.

name: review

'on':
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: review-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  claude-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install mise
        run: |
          curl https://mise.run | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install tools via mise
        run: |
          eval "$(mise activate bash)"
          mise install -y

      - name: Get PR diff
        id: diff
        run: |
          echo "::group::Fetching PR changes"
          git fetch origin ${{ github.event.pull_request.base.ref }}

          DIFF_FILE=$(mktemp)
          git diff origin/${{ github.event.pull_request.base.ref }}...HEAD > "$DIFF_FILE"

          DIFF_SIZE=$(wc -c < "$DIFF_FILE")
          echo "diff-size=${DIFF_SIZE}" >> $GITHUB_OUTPUT

          if [ $DIFF_SIZE -gt 100000 ]; then
            echo "::warning::Diff is large (${DIFF_SIZE} bytes), review may be truncated"
          fi

          echo "::endgroup::"

      - name: Review with Claude Code
      # This isn't even a real thing, don't use this action.
        uses: anthropics/anthropic-quickstarts@main
        with:
          mode: review
          files: |
            ${{ github.workspace }}
          api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pr-number: ${{ github.event.pull_request.number }}

      - name: Summary
        # this is stupid... update rules and /correct-behavior project to avoid status messages where the status can otherwise be deduced
        # only use status messages where you need an explicit message (such as local CLIs should say success, not just exit quietly).
        # ESPECIALLY don't use steps to print a single message IN CI. That's a waste, and is a drag on utilizing the github actions UX.
        run: |
          echo "::notice::Code review completed for PR #${{ github.event.pull_request.number }}"
