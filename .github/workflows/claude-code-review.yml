name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

concurrency:
  group: ${{ github.event_name == 'pull_request' && format('claude-review-{0}', github.event.pull_request.number) || format('claude-review-{0}-{1}', github.ref, github.sha) }}
  cancel-in-progress: true

jobs:
  claude-review:
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 50

      - name: Authenticate as GitHub App
        id: auth
        uses: ./.github/actions/github-app-auth
        with:
          app-id: ${{ secrets.REVIEW_GITHUB_APP_ID }}
          private-key: ${{ secrets.REVIEW_GITHUB_APP_PRIVATE_KEY }}

      - name: Get additional job context
        uses: qoomon/actions--context@v5
        if: ${{ !cancelled() }}
        id: additional-context
        continue-on-error: true

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        env:
          # These are in addition to any parsed settings.json files
          INPUT_SETTINGS_JSON: |
            {
              "permissions": {
                "additionalDirectories": ["/tmp/"],
                "allow":[
                  "Task",
                  "Glob",
                  "Grep",
                  "LS",
                  "ExitPlanMode",
                  "Read",
                  "Edit",
                  "Write",
                  "Replace",
                  "MultiEdit",
                  "NotebookRead",
                  "NotebookEdit",
                  "TodoWrite",
                  "WebSearch",
                  "WebFetch",
                  "Bash",
                  "BashOutput",
                  "KillBash",
                  "ListMcpResourcesTool",
                  "ReadMcpResourceTool",
                  "SlashCommand",
                  "Skill",
                  "mcp__github_inline_comment__create_inline_comment",
                  
                  "Bash(git log:*)",
                  "Bash(git diff:*)",
                  "Bash(git status:*)",
                  "Bash(git rev-parse:*)",
                  "Bash(git fetch:*)",
                  "Bash(git show:*)",
                  "Bash(git remote get-url:*)",
                  "Bash(git rm:*)",
                  "Bash(gh issue view:*)",
                  "Bash(gh search:*)",
                  "Bash(gh issue list:*)",
                  "Bash(gh pr comment:*)",
                  "Bash(gh pr diff:*)",
                  "Bash(gh pr view:*)",
                  "Bash(gh pr list:*)",
                  "Bash(gh run list:*)",
                  "Bash(gh run view:*)"
                ],
                "_denyComment": "It will wait for it's own check run to complete, not to mention it should review the code."
                "deny": [
                  "mcp__github_ci__get_ci_status",
                  "mcp__github_ci__get_workflow_run_details",
                  "mcp__github_ci__download_job_log",
                  "Bash(gh pr checks:*)"
                ]
              },
              "env": {
                "GH_TOKEN": "${{ steps.auth.outputs.token }}",
                "_GH_PAGER_COMMENT": "disable gh from being able to treat the terminal as interactive",
                "GH_PAGER": "cat",
                "GH_PROMPT_DISABLED": "true",
                "_GH_BROWSER_COMMENT": "what app to open URLs with, since claude is not interactive, we use curl to pipe it to stdout",
                "GH_BROWSER": "curl",
                "CLAUDE_CODE_REMOTE": "true"
              }
            }
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # WARNING: PRINTS FULL JSON OUTPUT WHICH MAY INCLUDE SECRETS.
          # ONLY USE IN PRIVATE ENVIRONMENTS.
          show_full_output: true
          # bug: https://github.com/anthropics/claude-code-action/issues/759
          # won't find the past comments since it's looking for github-actions[bot], not the auth it uses to post the comment.
          bot_id: ${{ steps.auth.outputs.user-id }}
          settings: ${{ env.INPUT_SETTINGS_JSON }}
          additional_permissions: |
            actions: read
          prompt: |
            REPO: ${{ github.repository }}
            PR_NUMBER: ${{ github.event.pull_request.number }}

            Please review this pull request and provide feedback on:
            - Code quality and best practices
            - Potential bugs or issues
            - Performance considerations
            - Security concerns
            - Test coverage
            - Accuracy of comments

            Do not use the CI output from this PR to base your review. You are to review the code itself, not the output of the CI jobs.

            Use the repository's CLAUDE.md for guidance on style and conventions. Be constructive and helpful in your feedback.

            Use `gh pr view` and associated `gh` tools to evaluate the changes in the context of the PR title/body, commit messages, other user's reviews, and comments and reviews left on the PR.
            Questions you leave in past reviews may be answered in the PR body or comments.

            Use `mcp__github_inline_comment__create_inline_comment` to highlight specific code issues. Do not leave duplicate inline comments, and resolve comments that have been addressed since your last review.

            Use `gh pr comment --delete-last --yes` with your Bash tool to leave your review as a comment on the PR.
            CRITICAL: You must use --delete-last and --yes to ensure your previous review comment is removed.
            CRITICAL: Do not post any "test" or "review in progress" comments. Only post your final review, deleting previous reviews.
            CRITICAL: NEVER post a link like "detailed review can be found at <url>". You MUST post the FULL review in the PR.
            CRITICAL: your review should have a summary section and capture details in a collapsable section so the default view is concise and to the point.
            CRITICAL: Your review MUST contain `<details>` and `<summary>` HTML tags to make the details collapsable.
            CRITICAL: Your review must detail how you arrived at your conclusions, especially the % scores you assigned.

            Use these emoji to help convey your summary.
            ✅ Something you checked that is correct, or something the code changes and does what it's supposed to
            ❔ When you're confused about something that requires clarification before approval
            ⚠️ For something that you think might be a problem
            ❌ For something that is definitely a problem
              If any ❌ exists, your review summary should start with:
              > ❌ Some changes need to be made

            Use shields.io badges to convey high level metrics for your review. Here is an example:
            https://img.shields.io/badge/the%20result%20short%20string%20or%20number%20-%20?style=for-the-badge&label=REVIEW%20PART&labelColor=%23444&color=%23D00

            Use the "document name" url encoded for the result of you reviewing that part, and the label for the thing that you are reviewing.
            CRITICAL: The "document name" MUST end in "-%20" just before the query parameter delimeter. Without it, the shield will 404.
            You MUST have badges for at least the following:
            - (Code) quality ( number from 0-100% )
            - Security (number from 0-100%, or N/A if not applicable)
            - Simplicity (number from 0-100%, if below 90% suggest how to make it simpler)
            - Confidence (number from 0-100% signifying how confident you are in your assessment, aim for higher confidence but you can't know everything)

            Use the color (not label color) to indicate if it's good or bad. Generally 85+ should be green, 65+ yellow, and below that red.
            Anything below a 65% is a failure.
            Feel free to use badges to communicate strings as well, though that should be rare.

            CRITICAL: Your review MUST end in a list of reference links as shown in the example, and you MUST include a details/summary block
            You MUST include the following references:
              1. a link to the html_url for the workflow run

            Some examples: 
              <details>
              <summary>
              ### Code review summary
              ![](badge1) ![](badge2) ![](badge3)

              :+1: Overall, great work! This looks ready to merge to me!
              
              ✅ Thing I checked
              ✅ Another thing I think is great
              </summary>
              
              Heres all the detail from my review that I would normally capture to cover the details
              requested for the review.

              Extended details about what was looked into

              Another aspect

              ## Headings of L2 or greater to separate sections.
              
              </details>

              Notes:[^1][^2]
              [^1]: Workflow Run: [#123456](https://github.com/nsheaps/.ai/actions/runs.....)
              [^2]: PR: [nsheaps/.ai#123](https://github.com/nsheaps/.ai/pull/123)
              ... 

            or if you think there's an issue with the changes...

              <details>
              <summary>
              ### Code review summary
              ![](badge1) ![](badge2) ![](badge3)

              ❌ This PR does abc badly and needs to be corrected before it can be merged.
              
              ❔ I don't understand how <a specific part> works.
              ⚠️ I think this the performance will be an issue
              ❌ Your comments and PR descriptions suggest that you're trying to assign permissions to admins but it looks like you're actually assigning them to guests</summary>
              
              Heres all the detail from my review that I would normally capture to cover the details
              requested for the review.

              Extended details about what was looked into

              Another aspect

              ## Headings of L2 or greater to separate sections.
              
              </details>

              Notes:[^1][^2]
              [^1]: Workflow Run: [#123456](https://github.com/nsheaps/.ai/actions/runs.....)
              [^2]: PR: [nsheaps/.ai#123](https://github.com/nsheaps/.ai/pull/123)
              ... 

            If you would like to use a tool that isn't available to you but would help with future reviews, call them out in your review outside of the details block with details
            of which changes are needed to give you or grant you access to that tool.

            ==== Job Context: ====
            ${{ toJson(steps.additional-context.outputs) }}
            ==== end job context ====
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://docs.claude.com/en/docs/claude-code/cli-reference for available options
          # claude_args: |
          #   --allowed-tools
          #     "${{ env.INPUT_ALLOWED_TOOLS }}"
