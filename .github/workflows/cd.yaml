name: cd

# Architecture:
# - PRs: Automatically bump plugin versions and push to PR branch for review
# - Main: Only update marketplace.json metadata (versions already bumped in PR)
# This prevents infinite loops from version bump commits triggering themselves

'on':
  push:
    branches:
      - main
    paths:
      - 'plugins/**'
      - '.github/workflows/cd.yaml'
  pull_request:
    paths:
      - 'plugins/**'
      - '.github/workflows/cd.yaml'

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bump-plugin-versions-in-pr:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Authenticate as GitHub App
        id: auth
        uses: ./.github/actions/github-app-auth
        with:
          app-id: ${{ secrets.AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.AUTOMATION_GITHUB_APP_PRIVATE_KEY }}

      - name: Fetch and configure base branch
        run: |
          git fetch origin ${{ github.base_ref }}
          git config user.name "automation-nsheaps[bot]"
          git config user.email "251779498+automation-nsheaps[bot]@users.noreply.github.com"

      - name: mise install -y
        uses: jdx/mise-action@v2
        with:
          install: true
          cache: true

      - name: Check if version bumps needed
        id: check
        shell: bash
        run: |
          # Use justfile which handles base/HEAD comparison correctly
          PREVIEW=$(just release --dry-run --format=md)
          if echo "$PREVIEW" | grep -q "No version changes detected"; then
            echo "needs_bump=false" >> $GITHUB_OUTPUT
            echo "No plugins need version bumps"
          else
            echo "needs_bump=true" >> $GITHUB_OUTPUT
            echo "Plugins to bump:"
            echo "$PREVIEW"
          fi

      - name: Bump plugin versions
        if: steps.check.outputs.needs_bump == 'true'
        run: just release

      - name: Push version bumps to PR
        if: steps.check.outputs.needs_bump == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: bump plugin versions'
          file_pattern: 'plugins/*/.claude-plugin/plugin.json plugins/*/CHANGELOG.md'

      - name: Post version bump status
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          header: 'package: Version Bump Status'
          message: |
            ### package: Version Bump Status
            ${{ steps.check.outputs.needs_bump == 'true' && '✅ Version bumps committed to PR' || 'ℹ️ No version bumps needed' }}

  update-marketplace:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Authenticate as GitHub App
        id: auth
        uses: ./.github/actions/github-app-auth
        with:
          app-id: ${{ secrets.AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.AUTOMATION_GITHUB_APP_PRIVATE_KEY }}

      - name: mise install -y
        uses: jdx/mise-action@v2
        with:
          install: true
          cache: true

      - name: Update marketplace metadata
        id: update
        shell: bash
        run: just update-marketplace

      - name: Commit changes
        if: steps.update.outputs.updated == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: update marketplace metadata [skip ci]'
          file_pattern: '.claude-plugin/marketplace.json'
