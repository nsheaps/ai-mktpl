name: cd

'on':
  push:
    branches:
      - main
    paths:
      - 'plugins/**'
  pull_request:
    paths:
      - 'plugins/**'

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preview-version-bump:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: mise install -y
        uses: jdx/mise-action@v2
        with:
          install: true
          cache: true

      - name: Check version bumps
        id: preview
        shell: bash
        run: |
          TMP="$(mktemp)"
          just release --dry-run --format=md | tee "$TMP"
          echo "report<<EOF" >> $GITHUB_OUTPUT
          cat $TMP >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: post version bump report
        if: steps.preview.outputs.report != ''
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          header: 'package: Version Bump Preview'
          message: |
            ### package: Version Bump Preview
            ${{ steps.preview.outputs.report }}

  bump-plugin-versions:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: github app auth
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.AUTOMATION_GITHUB_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Get GitHub App User ID
        id: get-user-id
        run: echo "user-id=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
      - run: |
          git config --global user.name '${{ steps.app-token.outputs.app-slug }}[bot]'
          git config --global user.email '${{ steps.get-user-id.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com'

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: mise install -y
        uses: jdx/mise-action@v2
        with:
          install: true
          cache: true

      - name: Bump plugin versions
        id: bump
        shell: bash
        run: |
          just release

      - name: push tags
        shell: bash
        run: |
          git push origin --tags

  update-marketplace:
    needs: ['bump-plugin-versions']
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: github app auth
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.AUTOMATION_GITHUB_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Get GitHub App User ID
        id: get-user-id
        run: echo "user-id=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
      - run: |
          git config --global user.name '${{ steps.app-token.outputs.app-slug }}[bot]'
          git config --global user.email '${{ steps.get-user-id.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com'

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: mise install -y
        uses: jdx/mise-action@v2
        with:
          install: true
          cache: true

      - name: Update marketplace metadata
        id: update
        shell: bash
        run: just update-marketplace

      - name: Commit changes
        if: steps.update.outputs.updated == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: update marketplace metadata [skip ci]'
          file_pattern: '.claude-plugin/marketplace.json'
