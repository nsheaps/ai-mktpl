name: cd

'on':
  push:
    branches:
      - main
    paths:
      - 'plugins/**'
      - '.github/workflows/cd.yaml'
  pull_request:
    paths:
      - 'plugins/**'
      - '.github/workflows/cd.yaml'

concurrency:
  group: cd-${{ github.ref }}
  # Allow cancellation in both PRs and main (no more version tagging on main)
  cancel-in-progress: true

jobs:
  bump-plugin-versions-in-pr:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: write
      pull-requests: write
    outputs:
      has_changes: ${{ steps.detect.outputs.has_changes }}
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Authenticate as GitHub App
        id: auth
        uses: ./.github/actions/github-app-auth
        with:
          app-id: ${{ secrets.AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.AUTOMATION_GITHUB_APP_PRIVATE_KEY }}

      - name: Fetch base branch
        run: git fetch origin ${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}

      - name: mise install -y
        uses: jdx/mise-action@v3
        with:
          install: true
          cache: true

      - name: Install yarn dependencies
        run: yarn install --immutable

      - name: Detect changed plugins
        id: detect
        shell: bash
        run: |
          # Find plugins that have changes (compare to base branch)
          # Use two-dot diff (..) instead of three-dot (...) to avoid merge base issues
          CHANGED_PLUGINS=()
          for plugin_dir in plugins/*; do
            if [ ! -d "$plugin_dir" ]; then
              continue
            fi
            PLUGIN_NAME=$(basename "$plugin_dir")

            # Check if any files in this plugin changed (excluding CHANGELOG.md and plugin.json)
            if git diff --name-only "origin/${{ github.base_ref }}..HEAD" -- "$plugin_dir" | grep -v 'CHANGELOG.md$' | grep -v 'plugin.json$' | grep -q .; then
              CHANGED_PLUGINS+=("$PLUGIN_NAME")
            fi
          done

          if [ ${#CHANGED_PLUGINS[@]} -eq 0 ]; then
            echo "No plugins changed"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "Changed plugins: ${CHANGED_PLUGINS[*]}"
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "plugins=${CHANGED_PLUGINS[*]}" >> $GITHUB_OUTPUT
          fi

      - name: Bump versions for changed plugins using release-it
        if: steps.detect.outputs.has_changes == 'true'
        shell: bash
        run: |
          # Bump versions only for changed plugins using release-it
          for plugin_name in ${{ steps.detect.outputs.plugins }}; do
            echo "=== Bumping version for $plugin_name ==="
            cd "plugins/$plugin_name"
            yarn exec release-it --ci
            cd ../..
          done

      - name: Run lint after version bump
        if: steps.detect.outputs.has_changes == 'true'
        run: just lint

      - name: Push version bumps to PR
        if: steps.detect.outputs.has_changes == 'true'
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: 'chore: bump plugin versions'
          file_pattern: 'plugins/*/.claude-plugin/plugin.json plugins/*/CHANGELOG.md'
          branch: ${{ github.head_ref }}

      - name: Generate version bump report
        if: steps.detect.outputs.has_changes == 'true'
        id: report
        shell: bash
        run: |
          TMP="$(mktemp)"
          just release --dry-run --format=md | tee "$TMP"
          echo "report<<EOF" >> $GITHUB_OUTPUT
          cat $TMP >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post version bump comment
        if: steps.detect.outputs.has_changes == 'true' && steps.report.outputs.report != ''
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          header: 'plugin-versions'
          message: |
            ### Plugin Version Bumps
            ${{ steps.report.outputs.report }}

  update-marketplace:
    runs-on: ubuntu-latest
    # Run after version bumps in PRs, or directly on main pushes
    needs: [bump-plugin-versions-in-pr]
    if: |
      always() &&
      ((github.event_name == 'push' && github.ref == 'refs/heads/main') ||
       (github.event_name == 'pull_request' && needs.bump-plugin-versions-in-pr.result == 'success'))
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          # For PRs, checkout the head branch to get the version bump commits
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
          persist-credentials: false

      - name: Pull latest changes (for PR)
        if: github.event_name == 'pull_request'
        run: git pull origin ${{ github.head_ref }} || true

      - name: Authenticate as GitHub App
        id: auth
        uses: ./.github/actions/github-app-auth
        with:
          app-id: ${{ secrets.AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.AUTOMATION_GITHUB_APP_PRIVATE_KEY }}

      - name: mise install -y
        uses: jdx/mise-action@v3
        with:
          install: true
          cache: true

      - name: Update marketplace metadata
        id: update
        shell: bash
        run: just update-marketplace

      - name: Run lint after marketplace update
        run: just lint

      - name: Commit marketplace changes
        if: steps.update.outputs.updated == 'true'
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: 'chore: update marketplace metadata [skip ci]'
          file_pattern: '.claude-plugin/marketplace.json'
          branch: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
