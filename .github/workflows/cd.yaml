name: cd

'on':
  push:
    branches:
      - main
    paths:
      - 'plugins/**'
      - '.github/workflows/cd.yaml'
      # Ignore version/marketplace files to prevent bump loops
      - '!plugins/*/.claude-plugin/plugin.json'
      - '!.claude-plugin/marketplace.json'
  pull_request:
    paths:
      - 'plugins/**'
      - '.github/workflows/cd.yaml'
      # Ignore version/marketplace files to prevent bump loops
      - '!plugins/*/.claude-plugin/plugin.json'
      - '!.claude-plugin/marketplace.json'

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # For PRs: Preview version bumps only (dry-run, no commits)
  preview-version-bump:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch origin ${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}

      - name: mise install -y
        uses: jdx/mise-action@v3
        with:
          install: true
          cache: true

      - name: Detect changed plugins
        id: detect
        shell: bash
        run: |
          # Find plugins that have changes (compare to base branch)
          # Exclude CHANGELOG.md and plugin.json from triggering bumps
          CHANGED_PLUGINS=()
          for plugin_dir in plugins/*; do
            if [ ! -d "$plugin_dir" ]; then
              continue
            fi
            PLUGIN_NAME=$(basename "$plugin_dir")

            if git diff --name-only "origin/${{ github.base_ref }}..HEAD" -- "$plugin_dir" | grep -v 'CHANGELOG.md$' | grep -v 'plugin.json$' | grep -q .; then
              CHANGED_PLUGINS+=("$PLUGIN_NAME")
            fi
          done

          if [ ${#CHANGED_PLUGINS[@]} -eq 0 ]; then
            echo "No plugins changed"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "Changed plugins: ${CHANGED_PLUGINS[*]}"
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "plugins=${CHANGED_PLUGINS[*]}" >> $GITHUB_OUTPUT
          fi

      - name: Generate version bump preview
        if: steps.detect.outputs.has_changes == 'true'
        id: report
        shell: bash
        run: |
          TMP="$(mktemp)"
          just release --dry-run --format=md | tee "$TMP"
          echo "report<<EOF" >> $GITHUB_OUTPUT
          cat $TMP >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post version preview comment
        if: steps.detect.outputs.has_changes == 'true' && steps.report.outputs.report != ''
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          header: 'plugin-versions'
          message: |
            ### Plugin Version Bumps (Preview)
            _These versions will be bumped when merged to main._

            ${{ steps.report.outputs.report }}

      - name: Post no-changes comment
        if: steps.detect.outputs.has_changes != 'true'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          header: 'plugin-versions'
          message: |
            ### Plugin Version Bumps (Preview)
            _No plugin changes detected that require version bumps._

  # For main: Bump versions and update marketplace (separate commits, pushed together)
  bump-and-update-marketplace:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Authenticate as GitHub App
        id: auth
        uses: ./.github/actions/github-app-auth
        with:
          app-id: ${{ secrets.AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.AUTOMATION_GITHUB_APP_PRIVATE_KEY }}

      - name: mise install -y
        uses: jdx/mise-action@v3
        with:
          install: true
          cache: true

      - name: Install yarn dependencies
        run: yarn install --immutable

      - name: Detect changed plugins since last commit
        id: detect
        shell: bash
        run: |
          # Find plugins changed in the merge commit
          # Compare HEAD with HEAD~1 (the commit before the merge)
          CHANGED_PLUGINS=()
          for plugin_dir in plugins/*; do
            if [ ! -d "$plugin_dir" ]; then
              continue
            fi
            PLUGIN_NAME=$(basename "$plugin_dir")

            # Exclude CHANGELOG.md and plugin.json from triggering bumps
            if git diff --name-only HEAD~1..HEAD -- "$plugin_dir" | grep -v 'CHANGELOG.md$' | grep -v 'plugin.json$' | grep -q .; then
              CHANGED_PLUGINS+=("$PLUGIN_NAME")
            fi
          done

          if [ ${#CHANGED_PLUGINS[@]} -eq 0 ]; then
            echo "No plugins changed"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "Changed plugins: ${CHANGED_PLUGINS[*]}"
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "plugins=${CHANGED_PLUGINS[*]}" >> $GITHUB_OUTPUT
          fi

      - name: Bump versions for changed plugins
        if: steps.detect.outputs.has_changes == 'true'
        shell: bash
        run: |
          for plugin_name in ${{ steps.detect.outputs.plugins }}; do
            echo "=== Bumping version for $plugin_name ==="
            cd "plugins/$plugin_name"
            yarn exec release-it --ci
            cd ../..
          done

      - name: Run lint after version bump
        if: steps.detect.outputs.has_changes == 'true'
        run: just lint

      - name: Commit version bumps
        if: steps.detect.outputs.has_changes == 'true'
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: 'chore: bump plugin versions [skip ci]'
          file_pattern: 'plugins/*/.claude-plugin/plugin.json plugins/*/CHANGELOG.md'
          push_options: '--no-verify'
          skip_push: true

      - name: Update marketplace metadata
        id: update
        shell: bash
        run: just update-marketplace

      - name: Run lint after marketplace update
        run: just lint

      - name: Commit marketplace changes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: 'chore: update marketplace metadata [skip ci]'
          file_pattern: '.claude-plugin/marketplace.json'
          push_options: '--no-verify'
          skip_push: true

      - name: Push all changes together
        run: git push
