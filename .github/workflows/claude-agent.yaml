name: Claude Agent

# This workflow runs Claude Code in agent mode when triggered by repository_dispatch
# Agent mode is automatically enabled for repository_dispatch triggers
#
# The system prompt template is specified in the payload - no detection logic needed here
# All context for the agent is included in the prompt itself

on:
  repository_dispatch:
    types: [claude-agent]

jobs:
  claude:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 50

      - name: Install mise
        uses: jdx/mise-action@v3
        with:
          install: true

      - name: Authenticate as GitHub App
        id: auth
        uses: ./.github/actions/github-app-auth
        with:
          app-id: ${{ secrets.AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.AUTOMATION_GITHUB_APP_PRIVATE_KEY }}

      - name: Select prompt template based on trigger event
        id: template
        run: |
          EVENT="${{ github.event.client_payload.trigger.event }}"
          case "$EVENT" in
            "mention")
              echo "file=.ai/prompts/claude-agent-system.md" >> $GITHUB_OUTPUT
              ;;
            "issueCreated")
              echo "file=.ai/prompts/issue-planner-system.md" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "file=.ai/prompts/claude-agent-system.md" >> $GITHUB_OUTPUT
              ;;
          esac

      - name: Interpolate system prompt
        id: prompt
        uses: ./.github/actions/interpolate-prompt
        with:
          template-file: ${{ steps.template.outputs.file }}
          payload: ${{ toJson(github.event.client_payload) }}

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        env:
          # Settings ported from original claude.yaml workflow
          INPUT_SETTINGS_JSON: |
            {
              "permissions": {
                "additionalDirectories": ["/tmp/"],
                "allow": [
                  "Task",
                  "Glob",
                  "Grep",
                  "LS",
                  "ExitPlanMode",
                  "Read",
                  "Edit",
                  "Write",
                  "Replace",
                  "MultiEdit",
                  "NotebookRead",
                  "NotebookEdit",
                  "TodoWrite",
                  "WebSearch",
                  "WebFetch",
                  "Bash",
                  "BashOutput",
                  "KillBash",
                  "ListMcpResourcesTool",
                  "ReadMcpResourceTool",
                  "SlashCommand",
                  "Skill",
                  "mcp__github_comment__update_claude_comment",
                  "mcp__github_ci__get_ci_status",
                  "mcp__github_ci__get_workflow_run_details",
                  "mcp__github_ci__download_job_log",
                  "mcp__github__add_comment_to_pending_review",
                  "mcp__github__add_issue_comment",
                  "mcp__github__add_project_item",
                  "mcp__github__add_sub_issue",
                  "mcp__github__assign_copilot_to_issue",
                  "mcp__github__AssignCodingAgent",
                  "mcp__github__cancel_workflow_run",
                  "mcp__github__create_and_submit_pull_request_review",
                  "mcp__github__create_branch",
                  "mcp__github__create_gist",
                  "mcp__github__create_issue",
                  "mcp__github__create_or_update_file",
                  "mcp__github__create_pending_pull_request_review",
                  "mcp__github__create_pull_request",
                  "mcp__github__create_repository",
                  "mcp__github__delete_file",
                  "mcp__github__delete_pending_pull_request_review",
                  "mcp__github__delete_project_item",
                  "mcp__github__delete_workflow_run_logs",
                  "mcp__github__dismiss_notification",
                  "mcp__github__download_workflow_run_artifact",
                  "mcp__github__fork_repository",
                  "mcp__github__get_code_scanning_alert",
                  "mcp__github__get_commit",
                  "mcp__github__get_dependabot_alert",
                  "mcp__github__get_discussion",
                  "mcp__github__get_discussion_comments",
                  "mcp__github__get_file_contents",
                  "mcp__github__get_global_security_advisory",
                  "mcp__github__get_issue",
                  "mcp__github__get_issue_comments",
                  "mcp__github__get_job_logs",
                  "mcp__github__get_latest_release",
                  "mcp__github__get_me",
                  "mcp__github__get_notification_details",
                  "mcp__github__get_project",
                  "mcp__github__get_project_field",
                  "mcp__github__get_project_item",
                  "mcp__github__get_pull_request",
                  "mcp__github__get_pull_request_diff",
                  "mcp__github__get_pull_request_files",
                  "mcp__github__get_pull_request_review_comments",
                  "mcp__github__get_pull_request_reviews",
                  "mcp__github__get_pull_request_status",
                  "mcp__github__get_release_by_tag",
                  "mcp__github__get_secret_scanning_alert",
                  "mcp__github__get_tag",
                  "mcp__github__get_team_members",
                  "mcp__github__get_teams",
                  "mcp__github__get_workflow_run",
                  "mcp__github__get_workflow_run_logs",
                  "mcp__github__get_workflow_run_usage",
                  "mcp__github__IssueToFixWorkflow",
                  "mcp__github__list_branches",
                  "mcp__github__list_code_scanning_alerts",
                  "mcp__github__list_commits",
                  "mcp__github__list_dependabot_alerts",
                  "mcp__github__list_discussion_categories",
                  "mcp__github__list_discussions",
                  "mcp__github__list_gists",
                  "mcp__github__list_global_security_advisories",
                  "mcp__github__list_issue_types",
                  "mcp__github__list_issues",
                  "mcp__github__list_notifications",
                  "mcp__github__list_org_repository_security_advisories",
                  "mcp__github__list_project_fields",
                  "mcp__github__list_project_items",
                  "mcp__github__list_projects",
                  "mcp__github__list_pull_requests",
                  "mcp__github__list_releases",
                  "mcp__github__list_repository_security_advisories",
                  "mcp__github__list_secret_scanning_alerts",
                  "mcp__github__list_starred_repositories",
                  "mcp__github__list_sub_issues",
                  "mcp__github__list_tags",
                  "mcp__github__list_workflow_jobs",
                  "mcp__github__list_workflow_run_artifacts",
                  "mcp__github__list_workflow_runs",
                  "mcp__github__list_workflows",
                  "mcp__github__manage_notification_subscription",
                  "mcp__github__manage_repository_notification_subscription",
                  "mcp__github__mark_all_notifications_read",
                  "mcp__github__merge_pull_request",
                  "mcp__github__push_files",
                  "mcp__github__remove_sub_issue",
                  "mcp__github__reprioritize_sub_issue",
                  "mcp__github__request_copilot_review",
                  "mcp__github__rerun_failed_jobs",
                  "mcp__github__rerun_workflow_run",
                  "mcp__github__run_workflow",
                  "mcp__github__search_code",
                  "mcp__github__search_issues",
                  "mcp__github__search_orgs",
                  "mcp__github__search_pull_requests",
                  "mcp__github__search_repositories",
                  "mcp__github__search_users",
                  "mcp__github__star_repository",
                  "mcp__github__submit_pending_pull_request_review",
                  "mcp__github__unstar_repository",
                  "mcp__github__update_gist",
                  "mcp__github__update_issue",
                  "mcp__github__update_pull_request",
                  "mcp__github__update_pull_request_branch"
                ]
              },
              "model": "opus",
              "env": {
                "_GH_PAGER_COMMENT": "disable gh from being able to treat the terminal as interactive",
                "GH_PAGER": "cat",
                "GH_PROMPT_DISABLED": "true",
                "_GH_BROWSER_COMMENT": "what app to open URLs with, since claude is not interactive, we use curl to pipe it to stdout",
                "GH_BROWSER": "curl",
                "CLAUDE_CODE_REMOTE": "true"
              }
            }
        with:
          # Claude API authentication with priority: CLAUDE_API_KEY > ANTHROPIC_API_KEY > CLAUDE_CODE_OAUTH_TOKEN
          anthropic_api_key: ${{
            secrets.CLAUDE_API_KEY && secrets.CLAUDE_API_KEY ||
            ( secrets.ANTHROPIC_API_KEY && secrets.ANTHROPIC_API_KEY || '' ) }}
          claude_code_oauth_token: ${{
            secrets.CLAUDE_API_KEY && '' ||
            ( secrets.ANTHROPIC_API_KEY && '' || secrets.CLAUDE_CODE_OAUTH_TOKEN ) }}
          # Bot identity for git commits (from GitHub App auth)
          bot_id: ${{ steps.auth.outputs.user-id }}
          bot_name: '@claude via ${{ steps.auth.outputs.user-name }}'
          allowed_bots: 'github-actions[bot],automation-nsheaps[bot]'
          github_token: ${{ steps.auth.outputs.token }}
          # Prompt extracted from repository_dispatch payload
          prompt: ${{ steps.prompt.outputs.prompt }}
          # Enable full output for debugging
          show_full_output: true
          additional_permissions: |
            actions: read
          settings: ${{ env.INPUT_SETTINGS_JSON }}
          # MCP servers and allowed tools for GitHub integration
          claude_args: >-
            --allowedTools
            mcp__github__*,
            mcp__github_comment__update_claude_comment,
            mcp__github_ci__get_ci_status,
            mcp__github_ci__get_workflow_run_details,
            mcp__github_ci__download_job_log
