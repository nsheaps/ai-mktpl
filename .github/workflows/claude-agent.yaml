name: Claude Agent

# This workflow runs Claude Code in agent mode when triggered by repository_dispatch
# Agent mode is automatically enabled for repository_dispatch triggers

on:
  repository_dispatch:
    types: [claude-agent]

jobs:
  claude:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 50

      - name: Install mise
        uses: jdx/mise-action@v2
        with:
          install: true

      - name: Build prompt from dispatch payload
        id: prompt
        env:
          PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: |
          # Extract values from payload
          PROMPT=$(echo "$PAYLOAD" | jq -r '.prompt // ""')
          REPO=$(echo "$PAYLOAD" | jq -r '.source.repo // ""')
          PR_NUM=$(echo "$PAYLOAD" | jq -r '.source.pr_number // ""')
          ISSUE_NUM=$(echo "$PAYLOAD" | jq -r '.source.issue_number // ""')
          COMMENT_ID=$(echo "$PAYLOAD" | jq -r '.source.comment_id // ""')
          AUTHOR=$(echo "$PAYLOAD" | jq -r '.author.login // ""')
          ASSOCIATION=$(echo "$PAYLOAD" | jq -r '.author.association // ""')
          TRIGGER_TYPE=$(echo "$PAYLOAD" | jq -r '.trigger.type // ""')
          TRIGGER_ACTION=$(echo "$PAYLOAD" | jq -r '.trigger.action // ""')
          TITLE=$(echo "$PAYLOAD" | jq -r '.content.title // ""')

          # Read system prompt template
          SYSTEM_PROMPT=$(cat .ai/prompts/claude-agent-system.md)

          # Build context section
          CONTEXT="You are Claude, responding to a GitHub @mention.\n\n"
          CONTEXT+="## CRITICAL: How to Respond\n\n"
          CONTEXT+="Your text output is NOT visible to the user. You MUST use the GitHub MCP tools to post your response.\n\n"

          # Determine the target for the response
          if [ "$PR_NUM" != "null" ] && [ -n "$PR_NUM" ]; then
            CONTEXT+="**To respond, use \`mcp__github__create_issue_comment\` with:**\n"
            CONTEXT+="- owner: $(echo $REPO | cut -d/ -f1)\n"
            CONTEXT+="- repo: $(echo $REPO | cut -d/ -f2)\n"
            CONTEXT+="- issue_number: $PR_NUM\n\n"
          elif [ "$ISSUE_NUM" != "null" ] && [ -n "$ISSUE_NUM" ]; then
            CONTEXT+="**To respond, use \`mcp__github__create_issue_comment\` with:**\n"
            CONTEXT+="- owner: $(echo $REPO | cut -d/ -f1)\n"
            CONTEXT+="- repo: $(echo $REPO | cut -d/ -f2)\n"
            CONTEXT+="- issue_number: $ISSUE_NUM\n\n"
          fi

          CONTEXT+="## Context\n"
          CONTEXT+="- Repository: $REPO\n"
          if [ "$PR_NUM" != "null" ] && [ -n "$PR_NUM" ]; then
            CONTEXT+="- Related to PR #$PR_NUM\n"
          fi
          if [ "$ISSUE_NUM" != "null" ] && [ -n "$ISSUE_NUM" ]; then
            CONTEXT+="- Related to issue #$ISSUE_NUM\n"
          fi
          CONTEXT+="- Triggered by: $AUTHOR ($ASSOCIATION)\n"
          CONTEXT+="- Trigger: $TRIGGER_TYPE ($TRIGGER_ACTION)\n"
          if [ "$TITLE" != "null" ] && [ -n "$TITLE" ]; then
            CONTEXT+="\n## Title\n$TITLE\n"
          fi
          CONTEXT+="\n## User Request\n$PROMPT"

          # Output the full prompt (escape for multiline)
          {
            echo "prompt<<EOF"
            echo -e "$CONTEXT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          # Also output source info for potential use
          echo "pr_number=$PR_NUM" >> "$GITHUB_OUTPUT"
          echo "issue_number=$ISSUE_NUM" >> "$GITHUB_OUTPUT"
          echo "comment_id=$COMMENT_ID" >> "$GITHUB_OUTPUT"

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        env:
          # Settings ported from original claude.yaml workflow
          INPUT_SETTINGS_JSON: |
            {
              "permissions": {
                "additionalDirectories": ["/tmp/"],
                "allow": [
                  "Task",
                  "Glob",
                  "Grep",
                  "LS",
                  "ExitPlanMode",
                  "Read",
                  "Edit",
                  "Write",
                  "Replace",
                  "MultiEdit",
                  "NotebookRead",
                  "NotebookEdit",
                  "TodoWrite",
                  "WebSearch",
                  "WebFetch",
                  "Bash",
                  "BashOutput",
                  "KillBash",
                  "ListMcpResourcesTool",
                  "ReadMcpResourceTool",
                  "SlashCommand",
                  "Skill",
                  "mcp__github_comment__update_claude_comment",
                  "mcp__github_ci__get_ci_status",
                  "mcp__github_ci__get_workflow_run_details",
                  "mcp__github_ci__download_job_log"
                ]
              },
              "model": "opus",
              "env": {
                "_GH_PAGER_COMMENT": "disable gh from being able to treat the terminal as interactive",
                "GH_PAGER": "cat",
                "GH_PROMPT_DISABLED": "true",
                "_GH_BROWSER_COMMENT": "what app to open URLs with, since claude is not interactive, we use curl to pipe it to stdout",
                "GH_BROWSER": "curl",
                "CLAUDE_CODE_REMOTE": "true"
              }
            }
        with:
          # Claude API authentication with priority: CLAUDE_API_KEY > ANTHROPIC_API_KEY > CLAUDE_CODE_OAUTH_TOKEN
          anthropic_api_key: ${{
            secrets.CLAUDE_API_KEY && secrets.CLAUDE_API_KEY ||
            ( secrets.ANTHROPIC_API_KEY && secrets.ANTHROPIC_API_KEY || '' ) }}
          claude_code_oauth_token: ${{
            secrets.CLAUDE_API_KEY && '' ||
            ( secrets.ANTHROPIC_API_KEY && '' || secrets.CLAUDE_CODE_OAUTH_TOKEN ) }}
          # Prompt extracted from repository_dispatch payload
          prompt: ${{ steps.prompt.outputs.prompt }}
          # Enable full output for debugging
          show_full_output: true
          additional_permissions: |
            actions: read
          settings: ${{ env.INPUT_SETTINGS_JSON }}
          # MCP servers and allowed tools for GitHub integration
          claude_args: >-
            --allowedTools
            mcp__github__create_issue,
            mcp__github__create_issue_comment,
            mcp__github__update_issue_comment,
            mcp__github__get_issue,
            mcp__github__list_issues,
            mcp__github__create_pending_pull_request_review,
            mcp__github__get_pull_request_diff,
            mcp__github__add_comment_to_pending_review,
            mcp__github__submit_pending_pull_request_review,
            mcp__github__pull_request_read,
            mcp__github__github_support_docs_search,
            mcp__github_comment__update_claude_comment,
            mcp__github_ci__get_ci_status,
            mcp__github_ci__get_workflow_run_details,
            mcp__github_ci__download_job_log
