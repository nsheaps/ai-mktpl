name: Claude Agent - Mention

# Handles @claude mentions in:
# - Issue comments
# - PR review comments
# - PR reviews
# - Issue assignment with @claude in body/title

on:
  issue_comment:
    types: [created, edited]
  pull_request_review_comment:
    types: [created, edited]
  pull_request_review:
    types: [submitted]
  issues:
    types: [assigned]

jobs:
  dispatch:
    # Only run if @claude is mentioned
    if: >-
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && github.event.action == 'assigned' &&
        (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Authenticate as GitHub App
        id: auth
        uses: ./.github/actions/github-app-auth
        with:
          app-id: ${{ secrets.AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.AUTOMATION_GITHUB_APP_PRIVATE_KEY }}

      - name: Dispatch to Claude agent
        uses: ./.github/actions/dispatch-claude-agent
        with:
          token: ${{ steps.auth.outputs.token }}
          event-type: claude-agent-mention
          # Use the appropriate body based on event type
          prompt: >-
            ${{
              github.event_name == 'issue_comment' && github.event.comment.body ||
              github.event_name == 'pull_request_review_comment' && github.event.comment.body ||
              github.event_name == 'pull_request_review' && github.event.review.body ||
              github.event.issue.body
            }}
          issue-number: ${{ github.event.issue.number || '' }}
          pr-number: >-
            ${{
              github.event_name == 'pull_request_review_comment' && github.event.pull_request.number ||
              github.event_name == 'pull_request_review' && github.event.pull_request.number ||
              (github.event.issue.pull_request && github.event.issue.number) ||
              ''
            }}
          comment-id: >-
            ${{
              github.event.comment.id ||
              github.event.review.id ||
              ''
            }}
          author-login: >-
            ${{
              github.event.comment.user.login ||
              github.event.review.user.login ||
              github.event.issue.user.login
            }}
          author-association: >-
            ${{
              github.event.comment.author_association ||
              github.event.review.author_association ||
              github.event.issue.author_association
            }}
          title: ${{ github.event.issue.title || github.event.pull_request.title }}
