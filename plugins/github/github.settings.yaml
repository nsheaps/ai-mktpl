# github plugin configuration
#
# Override per-project via ${CLAUDE_PROJECT_DIR}/.claude/plugins.settings.yaml
# or per-user via ~/.claude/plugins.settings.yaml under the "github" key.
#
# Set enabled: false to disable auto-install without uninstalling the plugin.

github:
  enabled: true

  # Download and install the gh binary if not already on PATH.
  # Set to false when gh is managed externally (e.g. via mise with gh in mise.toml).
  # When false, the plugin still runs auto_auth_check if configured.
  auto_install: true

  # Install gh to $CLAUDE_PROJECT_DIR/bin/.local on web sessions.
  # Only used when auto_install is true.
  install_to_project: true

  # Run installation in the background (non-blocking session start)
  background_install: false

  # Specific gh version to install (default: latest)
  # version: "2.87.3"
  version: 'latest'

  # Auto-run `gh auth status` after install to verify authentication
  auto_auth_check: true
