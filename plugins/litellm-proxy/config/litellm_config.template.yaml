# LiteLLM Proxy Configuration Template
#
# Copy this to ~/.litellm/config.yaml and customize.
# Start proxy with: litellm --config ~/.litellm/config.yaml
#
# Docs: https://docs.litellm.ai/docs/proxy/configs

# --- Model List ---
# Define models and their providers. Use wildcard routing for simplicity.

model_list:
  # Anthropic (Claude) — wildcard routes all anthropic/* models
  - model_name: "anthropic/*"
    litellm_params:
      model: "anthropic/*"
      api_key: os.environ/ANTHROPIC_API_KEY

  # OpenAI — wildcard routes all openai/* models
