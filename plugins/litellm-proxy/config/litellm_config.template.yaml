# --- Load Balancing (optional) ---
# Multiple deployments of the same model_name enables automatic load balancing.
# Uncomment to add a second Anthropic deployment for redundancy:
#
# - model_name: "anthropic/*"
#   litellm_params:
#     model: "anthropic/*"
#     api_key: os.environ/ANTHROPIC_API_KEY_2

# --- Router Settings (optional) ---
# router_settings:
#   routing_strategy: "least-busy"   # simple-shuffle, least-busy, usage-based-routing
#   num_retries: 3
#   timeout: 60
#   retry_after: 5
#   allowed_fails: 3
#   cooldown_time: 60

# --- General Settings ---
general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  # Uncomment to enable the /anthropic pass-through endpoint
  pass_through_endpoints:
    - path: "/anthropic/{endpoint:path}"
      target: "https://api.anthropic.com/{endpoint}"
      headers:
        x-api-key: os.environ/ANTHROPIC_API_KEY
        anthropic-version: "2023-06-01"

# --- Litellm Settings ---
litellm_settings:
  # Drop unsupported params instead of erroring
  drop_params: true
  # Enable request/response logging
  set_verbose: false
  # Cache responses (optional)
  # cache: true
  # cache_params:
  #   type: "redis"
  #   host: "localhost"
  #   port: 6379

