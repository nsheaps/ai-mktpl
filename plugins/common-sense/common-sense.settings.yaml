# common-sense plugin configuration
#
# Override per-project via ${CLAUDE_PROJECT_DIR}/.claude/plugins.settings.yaml
# or per-user via ~/.claude/plugins.settings.yaml under the "common-sense" key.

common-sense:
  enabled: true

  # Where to also sync rule symlinks beyond the scope the plugin is installed in.
  #   false  — only sync to the installed scope (default)
  #   true   — also sync to user-level ~/.claude/rules/
  alsoSyncToUser: false

  # Auto-add the plugin to other repos' settings files.
  #   ""          — don't add to other repos (default)
  #   "org-name"  — add to projects cloned from that GitHub org
  #   "*"         — add to any git project
  alsoAddToRepos: ''

  # Which settings file to write enabledPlugins entries into:
  #   "local"    — settings.local.json (gitignored, personal preference)
  #   "shared"   — settings.json (committed, shared with team)
  syncSettingsTarget: 'local'
