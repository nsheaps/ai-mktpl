# github-app plugin configuration
#
# Override per-project via ${CLAUDE_PROJECT_DIR}/.claude/plugins.settings.yaml
# or per-user via ~/.claude/plugins.settings.yaml under the "github-app" key.
#
# Set enabled: false to disable token management without uninstalling.

github-app:
  enabled: true

  # --- Secret Sources ---
  #
  # Secrets can be provided three ways (in order of priority):
  #
  # 1. ref: A URI that loads ALL secrets at once. Supported schemes:
  #
  #    op://vault/item
  #      Fetches all fields from a 1Password item via nsheaps/op-exec.
  #      Field labels become env var names (e.g., GITHUB_APP_ID).
  #      Example: ref: "op://vault/github-app--repo--my-repo"
  #
  #    env-file://path/to/file
  #      Sources KEY=VALUE pairs from a file. Relative paths (./...)
  #      resolve against the project directory.
  #      Example: ref: "env-file://./.env.github-app"
  #      Example: ref: "env-file://~/.config/agent/github-app.env"
  #
  # 2. secrets.*: Individual secret references. Each value can be:
  #    - A literal value:         secrets.github_app_id: "12345"
  #    - An env var reference:    secrets.github_app_id: "${GITHUB_APP_ID}"
  #    - A 1Password field ref:   secrets.github_app_id: "op://vault/item/GITHUB_APP_ID"
  #    Individual secrets override ref values for the same field.
  #
  # 3. Environment variables: GITHUB_APP_ID, GITHUB_APP_PRIVATE_KEY_PATH, etc.
  #    Set before the session starts. Lowest priority.
  #
  # 4. Legacy flat settings: github_app_id, private_key_path, github_installation_id
  #    Kept for backwards compatibility. Lowest priority.

  # --- Option 1: Bulk secret reference ---
  # ref: "op://vault/github-app--repo--my-repo"
  # ref: "env-file://./.env.github-app"

  # --- Option 2: Individual secrets ---
  # secrets:
  #   github_app_id: "op://vault/item/GITHUB_APP_ID"
  #   github_app_client_id: "op://vault/item/GITHUB_APP_CLIENT_ID"
  #   github_app_client_secret: "op://vault/item/GITHUB_APP_CLIENT_SECRET"
  #   github_app_private_key: "op://vault/item/GITHUB_APP_PRIVATE_KEY"
  #   github_installation_id: "${GITHUB_INSTALLATION_ID}"

  # --- Option 3: Legacy flat settings ---
  # github_app_id: "12345"
  # private_key_path: "~/.config/agent/github-app.pem"
  # github_installation_id: "67890"

  # --- Other settings ---

  # Automatically configure git user.name and user.email from the
  # GitHub App's bot identity (e.g., "my-app[bot]" with noreply email).
  # Skipped if git user.name/email are already configured.
  # Set to false to disable.
  auto_git_config: true

  # Where to write the token (default: ~/.config/agent/github-token)
  # token_file: "~/.config/agent/github-token"
