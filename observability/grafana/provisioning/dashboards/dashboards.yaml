# Grafana Dashboard Provisioning
#
# Automatically loads the Claude Code dashboard on startup.

apiVersion: 1

providers:
  - name: 'Claude Code'
    orgId: 1
    folder: 'Claude Code'
    folderUid: 'claude-code'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
