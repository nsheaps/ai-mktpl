# Plugin Settings
# Each top-level key is a plugin name, with plugin-specific configuration below it.
# Plugins load settings from this file if no plugin-specific settings file exists.
#
# Settings Resolution Order:
# 1. plugins/<plugin-name>/<plugin-name>.settings.yaml (plugin-specific)
# 2. .claude/plugins.settings.yaml (this file, central config)
# 3. Plugin defaults (hardcoded in plugin)

datadog-otel-setup:
  # Target settings file to modify
  # Options: local (default), project, user
  # - local: .claude/settings.local.json (gitignored, recommended)
  # - project: .claude/settings.json (shared, committed)
  # - user: ~/.claude/settings.json (global)
  target: local

  # OTEL Configuration
  enabled: true
  endpoint: 'https://otel.datadoghq.com:4317'
  protocol: grpc # grpc | http/json | http/protobuf

  # API key can be:
  # - Environment variable reference: ${DD_API_KEY}
  # - 1Password reference: op://vault/item/field (requires op CLI)
  # - Direct value (NOT recommended for shared repos)
  api_key: ${DD_API_KEY}

  # Optional: Custom resource attributes
  # These become OTEL_RESOURCE_ATTRIBUTES
  resource_attributes:
    service.name: claude-code
    deployment.environment: development
