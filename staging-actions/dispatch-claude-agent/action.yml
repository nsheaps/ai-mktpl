name: 'Dispatch Claude Agent'
description: 'Send a repository dispatch event to trigger the Claude agent workflow'

branding:
  icon: 'send'
  color: 'orange'

inputs:
  token:
    description: 'GitHub token with permission to dispatch events'
    required: true
  prompt:
    description: 'The prompt/request to send to Claude'
    required: true
  repo:
    description: 'Repository in owner/repo format'
    required: false
    default: ${{ github.repository }}
  issue-number:
    description: 'Issue number (if applicable)'
    required: false
  pr-number:
    description: 'Pull request number (if applicable)'
    required: false
  comment-id:
    description: 'Comment ID (if applicable)'
    required: false
  author-login:
    description: 'Author username'
    required: false
    default: ''
  author-association:
    description: 'Author association (OWNER, MEMBER, etc.)'
    required: false
    default: ''
  trigger-type:
    description: 'Event name that triggered this (issue_comment, pull_request_review_comment, etc.)'
    required: false
    default: ${{ github.event_name }}
  trigger-action:
    description: 'Event action (created, edited, opened, etc.)'
    required: false
    default: ${{ github.event.action }}
  title:
    description: 'Title of the issue or PR'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Dispatch to Claude agent
      uses: peter-evans/repository-dispatch@v4
      with:
        token: ${{ inputs.token }}
        event-type: claude-agent
        # Schema: .github/schemas/claude-agent-payload.schema.json
        client-payload: |
          {
            "prompt": ${{ toJson(inputs.prompt) }},
            "trigger": {
              "type": "${{ inputs.trigger-type }}",
              "action": "${{ inputs.trigger-action }}"
            },
            "source": {
              "repo": "${{ inputs.repo }}",
              "issue_number": ${{ inputs.issue-number || 'null' }},
              "pr_number": ${{ inputs.pr-number || 'null' }},
              "comment_id": ${{ inputs.comment-id || 'null' }},
              "ref": "${{ github.ref }}"
            },
            "author": {
              "login": "${{ inputs.author-login }}",
              "association": "${{ inputs.author-association }}"
            },
            "content": {
              "title": ${{ toJson(inputs.title) }},
              "body": ${{ toJson(inputs.prompt) }}
            }
          }
